<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="Location de voitures à Marrakech - Ru Amsefeh. Service 24/7, livraison aéroport gratuite. Prix à partir de 300 DH/jour."/>
<title>Ru Amsefeh - Location Voitures Marrakech</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Tajawal:wght@400;500;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --gold:#C9943A;--gold-l:#E8B86D;--gold-d:#8B6420;
  --dark:#f5f5f5;--dark2:#ffffff;--dark3:#fafafa;
  --white:#1a1a1a;--grey:#666;--grey2:#999;
  --green:#25D366;--bg:#ffffff;
  --ff-display:'Playfair Display',serif;
  --ff-ar:'Tajawal',sans-serif;
  --ff-body:'DM Sans',sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}
body{background:var(--bg);color:var(--white);font-family:var(--ff-body);overflow-x:hidden;min-width:320px;text-rendering:optimizeSpeed;}

[dir="rtl"]{font-family:var(--ff-ar);}
[dir="rtl"] .nav-links{flex-direction:row-reverse;}
[dir="rtl"] .hero-left{text-align:right;}
[dir="rtl"] .hero-btns{flex-direction:row-reverse;}
[dir="rtl"] .footer-contact a{flex-direction:row-reverse;}
[dir="rtl"] .car-spec{flex-direction:row-reverse;}
[dir="rtl"] .step-content{text-align:right;}
[dir="rtl"] .testi-card{text-align:right;}
[dir="rtl"] .testi-stars{justify-content:flex-end;}
[dir="rtl"] .star-rating{justify-content:flex-end;}

/* === ANIMATIONS GLOBALES === */
@keyframes fadeInUp{
  from{opacity:0;transform:translateY(40px);}
  to{opacity:1;transform:translateY(0);}
}
@keyframes fadeInDown{
  from{opacity:0;transform:translateY(-30px);}
  to{opacity:1;transform:translateY(0);}
}
@keyframes fadeInLeft{
  from{opacity:0;transform:translateX(-40px);}
  to{opacity:1;transform:translateX(0);}
}
@keyframes fadeInRight{
  from{opacity:0;transform:translateX(40px);}
  to{opacity:1;transform:translateX(0);}
}
@keyframes scaleIn{
  from{opacity:0;transform:scale(0.8);}
  to{opacity:1;transform:scale(1);}
}
@keyframes shimmer{
  0%{background-position:200% 0;}
  100%{background-position:-200% 0;}
}
@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}
@keyframes pulse{
  0%,100%{opacity:1;transform:scale(1);}
  50%{opacity:0.6;transform:scale(1.1);}
}
@keyframes textReveal{
  from{opacity:0;transform:translateY(30px) rotateX(10deg);}
  to{opacity:1;transform:translateY(0) rotateX(0);}
}
@keyframes cardPop{
  0%{opacity:0;transform:translateY(60px) scale(0.95);}
  70%{transform:translateY(-5px) scale(1.02);}
  100%{opacity:1;transform:translateY(0) scale(1);}
}
@keyframes lineGrow{
  from{width:0;}
  to{width:48px;}
}
@keyframes spinIn{
  from{opacity:0;transform:rotate(-180deg) scale(0.5);}
  to{opacity:1;transform:rotate(0) scale(1);}
}
@keyframes countUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

/* Progress bar avec glow */
.progress-bar{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--gold-l),var(--gold));z-index:10000;width:0%;transition:width .1s ease;box-shadow:0 0 10px var(--gold),0 0 20px rgba(201,148,58,0.5);}

/* Nav avec animation */
nav{position:fixed;top:0;left:0;right:0;z-index:999;height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 5%;background:rgba(255,255,255,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(201,148,58,.15);transition:all .4s cubic-bezier(0.23,1,0.32,1);box-shadow:0 1px 3px rgba(0,0,0,.04);animation:fadeInDown 0.6s ease;}
nav.scrolled{height:58px;box-shadow:0 4px 30px rgba(0,0,0,.12);}
.nav-logo{display:flex;align-items:center;text-decoration:none;transition:transform 0.3s ease;}
.nav-logo:hover{transform:scale(1.05);}
.logo-emblem{width:80px;height:40px;overflow:hidden;border:1.5px solid var(--gold);flex-shrink:0;transition:all .4s cubic-bezier(0.23,1,0.32,1);border-radius:4px;}
nav.scrolled .logo-emblem{width:65px;height:32px;}
.logo-emblem img{width:100%;height:100%;object-fit:cover;}
.nav-links{display:flex;align-items:center;gap:28px;list-style:none;}
.nav-links li{opacity:0;animation:fadeInDown 0.5s ease forwards;}
.nav-links li:nth-child(1){animation-delay:0.1s;}
.nav-links li:nth-child(2){animation-delay:0.2s;}
.nav-links li:nth-child(3){animation-delay:0.3s;}
.nav-links li:nth-child(4){animation-delay:0.4s;}
.nav-links li:nth-child(5){animation-delay:0.5s;}
.nav-links a{text-decoration:none;color:rgba(0,0,0,.6);font-size:12px;letter-spacing:1.8px;text-transform:uppercase;font-weight:500;transition:all .3s ease;position:relative;padding-bottom:2px;}
.nav-links a::after{content:'';position:absolute;bottom:0;left:50%;width:0;height:1.5px;background:var(--gold);transition:all .3s ease;transform:translateX(-50%);}
.nav-links a:hover,.nav-links a.active{color:var(--gold);}
.nav-links a:hover::after,.nav-links a.active::after{width:100%;}
.nav-right{display:flex;align-items:center;gap:10px;opacity:0;animation:fadeInRight 0.6s ease 0.3s forwards;}
.btn-nav-cta{background:var(--gold);color:#fff;padding:9px 20px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border:none;cursor:pointer;transition:all .3s cubic-bezier(0.23,1,0.32,1);clip-path:polygon(0 0,calc(100% - 7px) 0,100% 7px,100% 100%,7px 100%,0 calc(100% - 7px));white-space:nowrap;position:relative;overflow:hidden;}
.btn-nav-cta::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);transition:left 0.5s;}
.btn-nav-cta:hover{background:var(--gold-l);transform:translateY(-2px);box-shadow:0 8px 25px rgba(201,148,58,.4);}
.btn-nav-cta:hover::before{left:100%;}
.nav-wa{width:36px;height:36px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);flex-shrink:0;}
.nav-wa:hover{transform:scale(1.15) rotate(10deg);box-shadow:0 4px 15px rgba(37,211,102,0.4);}
.nav-wa svg{width:18px;height:18px;fill:#fff;}
.burger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px;background:transparent;border:none;z-index:1000;}
.burger span{width:22px;height:1.5px;background:var(--white);transition:all .3s;display:block;}
.mob-menu{display:none;position:fixed;top:68px;left:0;right:0;background:rgba(255,255,255,.99);z-index:998;padding:24px 5%;flex-direction:column;gap:4px;border-bottom:1px solid rgba(201,148,58,.15);box-shadow:0 4px 10px rgba(0,0,0,.05);max-height:80vh;overflow-y:auto;transform:translateY(-20px);opacity:0;transition:all 0.3s ease;}
.mob-menu.open{display:flex;transform:translateY(0);opacity:1;}
.mob-menu a{color:rgba(0,0,0,.7);text-decoration:none;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;padding:12px 0;border-bottom:1px solid rgba(0,0,0,.04);transition:all 0.3s;position:relative;}
.mob-menu a::after{content:'';position:absolute;bottom:8px;left:0;width:0;height:1px;background:var(--gold);transition:width 0.3s;}
.mob-menu a:hover{color:var(--gold);padding-left:10px;}
.mob-menu a:hover::after{width:30px;}

/* === HERO SECTION AVEC ANIMATIONS === */
#hero{position:relative;min-height:100vh;display:flex;align-items:center;overflow:hidden;padding-top:68px;background:#fafafa;}
.hero-bg{position:absolute;inset:0;}
.hero-bg img{width:100%;height:100%;object-fit:cover;opacity:1;filter:brightness(1.05);transform:scale(1.1);transition:transform 8s ease;}
.hero-bg.loaded img{transform:scale(1);}
.hero-bg::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0.15);}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(201,148,58,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(201,148,58,.04) 1px,transparent 1px);background-size:70px 70px;z-index:1;}
.hero-inner{position:relative;z-index:2;width:100%;max-width:1280px;margin:0 auto;padding:80px 5%;}

/* Hero text animations */
.hero-pill{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(201,148,58,.6);padding:6px 18px;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:22px;background:rgba(255,255,255,.8);opacity:0;animation:textReveal 0.6s ease 0.2s forwards;}
.hero-pill::before{content:'';width:6px;height:6px;background:var(--gold);border-radius:50%;animation:pulse 2s infinite;}
h1.hero-title{font-family:var(--ff-display);font-size:clamp(38px,5vw,72px);line-height:1.1;font-weight:700;margin-bottom:10px;color:#1a1a1a;}
h1.hero-title span{display:inline-block;opacity:0;animation:textReveal 0.8s ease 0.3s forwards;}
h1.hero-title em{font-style:italic;color:var(--gold);display:block;opacity:0;animation:textReveal 0.8s ease 0.5s forwards;}
.hero-sub{color:rgba(0,0,0,.6);font-size:15px;line-height:1.85;margin-bottom:34px;max-width:600px;opacity:0;animation:textReveal 0.8s ease 0.7s forwards;}
.hero-feats{display:flex;gap:20px;margin-bottom:38px;flex-wrap:wrap;opacity:0;animation:fadeInUp 0.6s ease 0.9s forwards;}
.h-feat{display:flex;align-items:center;gap:7px;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:rgba(0,0,0,.7);transition:all 0.3s;}
.h-feat:hover{color:var(--gold);transform:translateX(5px);}
.h-feat svg{width:14px;height:14px;fill:var(--gold);flex-shrink:0;transition:transform 0.3s;}
.h-feat:hover svg{transform:scale(1.2);}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap;opacity:0;animation:fadeInUp 0.6s ease 1.1s forwards;}

/* Magnetic buttons */
.btn-primary{background:var(--gold);color:#fff;padding:14px 28px;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border:none;cursor:pointer;clip-path:polygon(0 0,calc(100% - 9px) 0,100% 9px,100% 100%,9px 100%,0 calc(100% - 9px));transition:all .3s cubic-bezier(0.23,1,0.32,1);display:inline-flex;align-items:center;gap:9px;white-space:nowrap;position:relative;overflow:hidden;}
.btn-primary::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);transition:left 0.6s;}
.btn-primary:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(201,148,58,.4);}
.btn-primary:hover::before{left:100%;}
.btn-primary svg{width:16px;height:16px;fill:#fff;flex-shrink:0;transition:transform 0.3s;}
.btn-primary:hover svg{transform:rotate(15deg) scale(1.1);}
.btn-outline{background:rgba(255,255,255,.8);color:#1a1a1a;padding:14px 28px;font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;border:1px solid rgba(0,0,0,.15);cursor:pointer;transition:all .3s cubic-bezier(0.23,1,0.32,1);white-space:nowrap;position:relative;overflow:hidden;}
.btn-outline::before{content:'';position:absolute;inset:0;background:var(--gold);transform:scaleX(0);transform-origin:left;transition:transform 0.4s ease;z-index:-1;}
.btn-outline:hover{border-color:var(--gold);color:#fff;transform:translateY(-3px);box-shadow:0 8px 20px rgba(201,148,58,.2);}
.btn-outline:hover::before{transform:scaleX(1);}
.hero-bottom-note{position:absolute;bottom:28px;left:5%;z-index:2;display:flex;align-items:center;gap:10px;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(0,0,0,.5);opacity:0;animation:fadeInUp 0.6s ease 1.3s forwards;}
.hero-bottom-note::before{content:'';width:28px;height:1px;background:var(--gold);}

/* === LANG FLOAT AVEC ANIMATION === */
.lang-float{position:fixed;bottom:26px;left:26px;z-index:997;display:flex;flex-direction:column;gap:8px;animation:float 4s ease-in-out infinite;}
[dir="rtl"] .lang-float{left:auto;right:26px;}
.lang-flag-btn{width:44px;height:44px;border-radius:50%;border:2px solid rgba(201,148,58,.35);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;transition:all .4s cubic-bezier(0.34,1.56,0.64,1);line-height:1;padding:0;overflow:hidden;position:relative;}
.lang-flag-btn:hover{border-color:var(--gold);transform:scale(1.15) rotate(5deg);box-shadow:0 4px 15px rgba(201,148,58,0.3);}
.lang-flag-btn.active{border-color:var(--gold);background:#fafafa;transform:scale(1.1);box-shadow:0 2px 10px rgba(201,148,58,0.2);}

/* === STAR RATING === */
.star-rating{display:flex;gap:6px;}
.star-rating .star{cursor:pointer;transition:all .3s cubic-bezier(0.34,1.56,0.64,1);fill:#ccc;width:28px;height:28px;}
.star-rating .star.active,.star-rating .star:hover{fill:var(--gold);transform:scale(1.3) rotate(15deg);}

/* === SECTION HEADERS AVEC ANIMATIONS === */
.sec-head{text-align:center;margin-bottom:56px;}
.sec-label{display:inline-flex;align-items:center;gap:12px;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;}
.sec-label::before,.sec-label::after{content:'';width:0;height:1px;background:var(--gold-d);transition:width .8s ease;}
.sec-head.vis .sec-label::before,.sec-head.vis .sec-label::after{width:48px;animation:lineGrow 0.8s ease forwards;}
.sec-title{font-family:var(--ff-display);font-size:clamp(28px,3.8vw,52px);font-weight:700;line-height:1.1;color:#1a1a1a;opacity:0;transform:translateY(20px);transition:all 0.6s ease;}
.sec-head.vis .sec-title{opacity:1;transform:translateY(0);}
.sec-title em{font-style:italic;color:var(--gold);}
.sec-sub{color:var(--grey);font-size:14px;margin-top:10px;opacity:0;transform:translateY(15px);transition:all 0.6s ease 0.2s;}
.sec-head.vis .sec-sub{opacity:1;transform:translateY(0);}

/* === CARS SECTION AVEC ANIMATIONS === */
#cars{padding:96px 5%;background:var(--bg);}
.season-toggle{display:flex;justify-content:center;margin-bottom:40px;border:1px solid rgba(201,148,58,.3);max-width:300px;margin-left:auto;margin-right:auto;border-radius:4px;overflow:hidden;opacity:0;animation:fadeInUp 0.6s ease forwards;}
.s-btn{flex:1;padding:10px 12px;background:transparent;border:none;color:var(--grey);font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .4s cubic-bezier(0.23,1,0.32,1);font-family:var(--ff-body);white-space:nowrap;position:relative;overflow:hidden;}
.s-btn::before{content:'';position:absolute;inset:0;background:var(--gold);transform:scaleX(0);transform-origin:left;transition:transform 0.4s ease;z-index:-1;}
.s-btn.active{background:var(--gold);color:#fff;}
.s-btn:hover:not(.active){color:var(--gold);}
.s-btn:hover:not(.active)::before{transform:scaleX(1);opacity:0.1;}
.cars-grid{max-width:1300px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}

/* Car cards avec animations avancées */
.car-card{background:#fff;position:relative;overflow:hidden;cursor:pointer;transition:all .4s cubic-bezier(0.23,1,0.32,1);opacity:0;transform:translateY(60px);border:1px solid rgba(0,0,0,.06);border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.03);display:flex;flex-direction:column;will-change:transform;}
.car-card.vis{animation:cardPop 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards;}
.car-card:nth-child(1).vis{animation-delay:.05s;}
.car-card:nth-child(2).vis{animation-delay:.1s;}
.car-card:nth-child(3).vis{animation-delay:.15s;}
.car-card:nth-child(4).vis{animation-delay:.2s;}
.car-card:nth-child(5).vis{animation-delay:.25s;}
.car-card:nth-child(6).vis{animation-delay:.3s;}
.car-card:nth-child(7).vis{animation-delay:.35s;}
.car-card:nth-child(8).vis{animation-delay:.4s;}
.car-card:nth-child(9).vis{animation-delay:.45s;}
.car-card:nth-child(10).vis{animation-delay:.5s;}
.car-card:nth-child(11).vis{animation-delay:.55s;}
.car-card:nth-child(12).vis{animation-delay:.6s;}
.car-card:hover{transform:translateY(-8px) scale(1.02);box-shadow:0 20px 40px rgba(0,0,0,.12);}
.car-badge{position:absolute;top:14px;right:14px;background:var(--gold);color:#fff;font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;z-index:3;border-radius:2px;transition:all 0.3s;}
[dir="rtl"] .car-badge{right:auto;left:14px;}
.car-card:hover .car-badge{transform:scale(1.1);box-shadow:0 4px 10px rgba(201,148,58,0.3);}

/* Car image avec hover overlay et shimmer */
.car-img-wrap{width:100%;height:180px;overflow:hidden;background:#f0f0f0;position:relative;}
.car-img-wrap::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);background-size:200% 100%;z-index:1;animation:shimmer 1.5s infinite;}
.car-img-wrap.loaded::before{display:none;}
.car-img-wrap img{width:100%;height:100%;object-fit:cover;transition:all .5s cubic-bezier(0.23,1,0.32,1);will-change:transform;}
.car-card:hover .car-img-wrap img{transform:scale(1.1);}
.car-img-wrap::after{content:'';position:absolute;inset:0;background:rgba(201,148,58,0);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:600;transition:all 0.4s;z-index:2;}
.car-card:hover .car-img-wrap::after{content:attr(data-hover);background:rgba(201,148,58,0.85);}
.car-info{padding:16px;display:flex;flex-direction:column;flex:1;}
.car-name{font-family:var(--ff-display);font-size:18px;font-weight:700;margin-bottom:8px;color:#1a1a1a;transition:color 0.3s;}
.car-card:hover .car-name{color:var(--gold);}
.car-specs-row{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.car-spec{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--grey);transition:all 0.3s;}
.car-spec svg{width:12px;height:12px;fill:var(--gold);flex-shrink:0;}
.car-card:hover .car-spec{color:var(--gold-d);}
.car-price-wrap{display:flex;align-items:baseline;gap:8px;margin-top:auto;}
.car-price{font-size:24px;font-weight:700;color:var(--gold);font-family:var(--ff-display);transition:all 0.3s;}
.car-card:hover .car-price{transform:scale(1.05);}
.car-price-unit{font-size:12px;color:var(--grey);}
.car-price-summer{font-size:10px;color:var(--grey2);margin-top:2px;}
.btn-book-car{width:100%;margin-top:12px;background:transparent;border:1.5px solid var(--gold);color:var(--gold);padding:10px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .4s cubic-bezier(0.23,1,0.32,1);font-family:var(--ff-body);white-space:nowrap;border-radius:4px;position:relative;overflow:hidden;}
.btn-book-car::before{content:'';position:absolute;inset:0;background:var(--gold);transform:scaleX(0);transform-origin:left;transition:transform 0.4s ease;z-index:-1;}
.btn-book-car:hover{background:var(--gold);color:#fff;transform:translateY(-2px);box-shadow:0 8px 20px rgba(201,148,58,.3);}
.btn-book-car:hover::before{transform:scaleX(1);}

/* === CONDITIONS AVEC ANIMATIONS === */
#conditions{padding:96px 5%;background:#fafafa;position:relative;overflow:hidden;}
.cond-grid{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.cond-card{background:#fff;padding:40px 30px;position:relative;overflow:hidden;transition:all .5s cubic-bezier(0.23,1,0.32,1);border:1px solid rgba(0,0,0,.04);border-radius:6px;opacity:0;transform:translateY(30px);}
.cond-card.vis{opacity:1;transform:translateY(0);transition:all 0.6s ease;}
.cond-card:nth-child(1).vis{transition-delay:0.1s;}
.cond-card:nth-child(2).vis{transition-delay:0.2s;}
.cond-card:nth-child(3).vis{transition-delay:0.3s;}
.cond-card:hover{transform:translateY(-10px) scale(1.02);box-shadow:0 25px 60px rgba(201,148,58,.12);}
.cond-icon{width:50px;height:50px;border:1.5px solid rgba(201,148,58,.3);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:22px;transition:all .5s cubic-bezier(0.34,1.56,0.64,1);}
.cond-card:hover .cond-icon{transform:rotate(360deg) scale(1.15);border-color:var(--gold);background:rgba(201,148,58,0.1);}
.cond-icon svg{width:24px;height:24px;fill:var(--gold);transition:all 0.3s;}
.cond-title{font-family:var(--ff-display);font-size:18px;font-weight:700;color:var(--gold);margin-bottom:14px;transition:all 0.3s;}
.cond-card:hover .cond-title{transform:translateX(5px);}
.cond-list{list-style:none;}
.cond-list li{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:rgba(0,0,0,.6);line-height:1.7;margin-bottom:8px;transition:all 0.3s;}
.cond-list li::before{content:'▸';color:var(--gold);font-size:10px;margin-top:4px;flex-shrink:0;transition:all 0.3s;}
.cond-card:hover .cond-list li::before{transform:translateX(3px);}
[dir="rtl"] .cond-list li{flex-direction:row-reverse;}
[dir="rtl"] .cond-icon{margin-left:auto;margin-right:0;}
[dir="rtl"] .cond-card{text-align:right;}

/* === HOW SECTION AVEC ANIMATIONS === */
#how{padding:96px 5%;background:#fff;}
.how-grid{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:0;position:relative;}
.step{text-align:center;padding:0 18px;position:relative;z-index:1;opacity:0;transform:translateY(30px);}
.step.vis{opacity:1;transform:translateY(0);transition:all 0.6s ease;}
.step:nth-child(1).vis{transition-delay:0.1s;}
.step:nth-child(2).vis{transition-delay:0.2s;}
.step:nth-child(3).vis{transition-delay:0.3s;}
.step:nth-child(4).vis{transition-delay:0.4s;}
.step-num{width:70px;height:70px;border:2px solid var(--gold);background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 22px;transition:all .5s cubic-bezier(0.34,1.56,0.64,1);position:relative;}
.step-num::before{content:'';position:absolute;inset:-5px;border:2px solid transparent;border-top-color:var(--gold);border-radius:50%;opacity:0;transition:all 0.5s;}
.step:hover .step-num{transform:scale(1.1) rotate(10deg);background:var(--gold);box-shadow:0 8px 25px rgba(201,148,58,0.3);}
.step:hover .step-num::before{opacity:1;animation:spinIn 1s linear infinite;}
.step:hover .step-num svg{fill:#fff;}
.step-num svg{width:28px;height:28px;fill:var(--gold);transition:all 0.3s;}
.step-title{font-size:14px;font-weight:600;color:#1a1a1a;margin-bottom:8px;transition:all 0.3s;}
.step:hover .step-title{color:var(--gold);transform:translateY(-2px);}
.step-text{font-size:12px;color:var(--grey);line-height:1.7;}

/* === TESTIMONIALS AVEC ANIMATIONS === */
#testi{padding:96px 5%;background:#fafafa;}
.testi-wrap{max-width:1100px;margin:0 auto;}
.testi-slides-outer{overflow:hidden;width:100%;}
.testi-slides{display:flex;gap:20px;transition:transform .5s cubic-bezier(0.23,1,0.32,1);width:100%;}
.testi-card{flex:0 0 auto;background:#fff;padding:32px;border:1px solid rgba(0,0,0,.04);position:relative;transition:all .4s cubic-bezier(0.23,1,0.32,1);box-shadow:0 2px 8px rgba(0,0,0,.02);border-radius:6px;}
.testi-card:hover{transform:translateY(-6px) scale(1.02);box-shadow:0 15px 40px rgba(201,148,58,.1);}
.testi-card::before{content:'\201C';position:absolute;top:18px;right:22px;font-family:var(--ff-display);font-size:72px;color:rgba(201,148,58,.1);line-height:1;transition:all 0.4s;}
.testi-card:hover::before{color:rgba(201,148,58,.2);transform:scale(1.1);}
[dir="rtl"] .testi-card::before{right:auto;left:22px;content:'\201D';}
.testi-stars{display:flex;gap:3px;margin-bottom:16px;}
.testi-stars svg{width:16px;height:16px;fill:var(--gold);flex-shrink:0;transition:all 0.3s;}
.testi-card:hover .testi-stars svg:nth-child(1){animation:pulse 0.5s 0.1s;}
.testi-card:hover .testi-stars svg:nth-child(2){animation:pulse 0.5s 0.2s;}
.testi-card:hover .testi-stars svg:nth-child(3){animation:pulse 0.5s 0.3s;}
.testi-card:hover .testi-stars svg:nth-child(4){animation:pulse 0.5s 0.4s;}
.testi-card:hover .testi-stars svg:nth-child(5){animation:pulse 0.5s 0.5s;}
.testi-text{font-size:13px;color:rgba(0,0,0,.6);line-height:1.85;margin-bottom:20px;font-style:italic;transition:all 0.3s;}
.testi-card:hover .testi-text{color:rgba(0,0,0,.8);}
.testi-name{font-size:13px;font-weight:600;color:#1a1a1a;transition:all 0.3s;}
.testi-card:hover .testi-name{color:var(--gold);}
.testi-loc{font-size:10px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-top:3px;}
.testi-nav{display:flex;justify-content:center;gap:10px;margin-top:36px;}
.t-btn{width:42px;height:42px;border:1.5px solid rgba(201,148,58,.3);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .4s cubic-bezier(0.34,1.56,0.64,1);border-radius:50%;}
.t-btn:hover{background:var(--gold);border-color:var(--gold);transform:scale(1.15);}
.t-btn:hover svg{fill:#fff;}
.t-btn:active{transform:scale(0.95);}
.t-btn svg{width:16px;height:16px;fill:#1a1a1a;transition:all 0.3s;}

/* === ADD REVIEW AVEC ANIMATIONS === */
#add-review{padding:60px 5%;background:#fff;border-top:1px solid rgba(201,148,58,.1);}
.review-form-wrap{max-width:600px;margin:0 auto;opacity:0;transform:translateY(30px);transition:all 0.6s ease;}
.review-form-wrap.vis{opacity:1;transform:translateY(0);}
.review-form-wrap h3{font-family:var(--ff-display);font-size:24px;text-align:center;margin-bottom:8px;color:#1a1a1a;}
.review-form-wrap h3 em{color:var(--gold);font-style:italic;}
.rev-ff{margin-bottom:16px;}
.rev-ff label{display:block;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:7px;transition:all 0.3s;}
.rev-ff input,.rev-ff textarea{width:100%;background:#fafafa;border:1.5px solid rgba(201,148,58,.2);color:#1a1a1a;padding:12px 15px;font-family:var(--ff-body);font-size:13px;outline:none;transition:all .4s cubic-bezier(0.23,1,0.32,1);border-radius:4px;}
.rev-ff input:focus,.rev-ff textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,148,58,0.1);transform:translateY(-2px);}
.rev-ff textarea{resize:vertical;min-height:80px;}
.rev-rating-wrap{display:flex;align-items:center;gap:14px;margin-bottom:20px;justify-content:center;flex-wrap:wrap;}
.rev-rating-wrap span{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--grey);}
.btn-submit-review{width:100%;background:var(--gold);color:#fff;padding:14px;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border:none;cursor:pointer;transition:all .4s cubic-bezier(0.23,1,0.32,1);font-family:var(--ff-body);border-radius:4px;position:relative;overflow:hidden;}
.btn-submit-review::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);transition:left 0.6s;}
.btn-submit-review:hover{background:var(--gold-l);transform:translateY(-3px);box-shadow:0 15px 40px rgba(201,148,58,.3);}
.btn-submit-review:hover::before{left:100%;}
.btn-submit-review:active{transform:translateY(-1px);}
.rev-error{color:#e74c3c;font-size:10px;text-align:center;margin-top:8px;display:none;transition:all 0.3s;}
.rev-error.show{display:block;animation:shake 0.5s ease;}
@keyframes shake{
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-10px);}
  40%{transform:translateX(10px);}
  60%{transform:translateX(-5px);}
  80%{transform:translateX(5px);}
}

/* === STRIP AVEC ANIMATIONS === */
#strip{padding:44px 5%;background:#fff;border-top:1px solid rgba(201,148,58,.1);border-bottom:1px solid rgba(201,148,58,.1);}
.strip-grid{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:36px;}
.strip-item{display:flex;align-items:center;gap:14px;opacity:0;transform:translateY(20px);transition:all 0.5s ease;}
.strip-item.vis{opacity:1;transform:translateY(0);}
.strip-item:nth-child(1).vis{transition-delay:0.1s;}
.strip-item:nth-child(2).vis{transition-delay:0.2s;}
.strip-item:nth-child(3).vis{transition-delay:0.3s;}
.strip-item:nth-child(4).vis{transition-delay:0.4s;}
.strip-item:hover{transform:translateY(-5px);}
.strip-icon{width:44px;height:44px;flex-shrink:0;border:1.5px solid rgba(201,148,58,.28);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .4s cubic-bezier(0.34,1.56,0.64,1);}
.strip-item:hover .strip-icon{background:var(--gold);border-color:var(--gold);transform:scale(1.15) rotate(10deg);}
.strip-item:hover .strip-icon svg{fill:#fff;}
.strip-icon svg{width:20px;height:20px;fill:var(--gold);transition:all 0.3s;}
.strip-t{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:3px;transition:all 0.3s;}
.strip-item:hover .strip-t{color:var(--gold);}
.strip-s{font-size:11px;color:var(--grey);}
[dir="rtl"] .strip-item{flex-direction:row-reverse;text-align:right;}

/* === ADDRESS FOOTER === */
.address-footer{text-align:center;padding:20px 5%;background:#fff;border-top:1px solid rgba(201,148,58,.15);}
.address-footer p{font-family:var(--ff-display);font-size:16px;color:var(--gold);letter-spacing:1px;font-weight:700;font-style:italic;transition:all 0.3s;}
.address-footer:hover p{letter-spacing:2px;}

/* === FOOTER AVEC ANIMATIONS === */
footer{background:#fafafa;padding:60px 5% 28px;border-top:1px solid rgba(201,148,58,.08);}
.footer-inner{max-width:1300px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr;gap:60px;margin-bottom:50px;}
.f-brand{font-family:var(--ff-display);font-size:24px;font-weight:700;color:var(--gold);letter-spacing:3px;display:block;margin-bottom:3px;transition:all 0.3s;}
.f-brand:hover{letter-spacing:4px;}
.f-brand small{color:var(--grey);font-size:9px;letter-spacing:4px;text-transform:uppercase;font-family:var(--ff-body);}
.f-desc{color:var(--grey);font-size:13px;line-height:1.8;margin-top:14px;max-width:280px;}
.f-contact{margin-top:22px;}
.f-contact a{display:flex;align-items:center;gap:9px;color:var(--grey);font-size:13px;text-decoration:none;margin-bottom:9px;transition:all .4s cubic-bezier(0.23,1,0.32,1);position:relative;}
.f-contact a::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:1px;background:var(--gold);transition:width 0.3s;}
.f-contact a:hover{color:var(--gold);transform:translateX(5px);}
.f-contact a:hover::after{width:100%;}
.f-contact svg{width:14px;height:14px;fill:var(--gold);flex-shrink:0;transition:all 0.3s;}
.f-contact a:hover svg{transform:scale(1.2) rotate(10deg);}
[dir="rtl"] .f-contact a{flex-direction:row-reverse;}
[dir="rtl"] .f-contact a:hover{transform:translateX(-5px);}
.f-col h4{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:22px;position:relative;display:inline-block;}
.f-col h4::after{content:'';position:absolute;bottom:-4px;left:0;width:20px;height:1px;background:var(--gold);transition:width 0.3s;}
.f-col:hover h4::after{width:100%;}
.f-col ul{list-style:none;}
.f-col li{margin-bottom:9px;}
.f-col a{color:var(--grey);text-decoration:none;font-size:13px;transition:all .3s cubic-bezier(0.23,1,0.32,1);display:inline-block;position:relative;}
.f-col a::after{content:'';position:absolute;bottom:-1px;left:0;width:0;height:1px;background:var(--gold);transition:width 0.3s;}
.f-col a:hover{color:var(--gold);transform:translateX(5px);}
.f-col a:hover::after{width:100%;}
.socials{display:flex;gap:10px;margin-top:18px;}
.soc-btn{width:36px;height:36px;border:1.5px solid rgba(201,148,58,.28);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .4s cubic-bezier(0.34,1.56,0.64,1);text-decoration:none;border-radius:50%;position:relative;overflow:hidden;}
.soc-btn::before{content:'';position:absolute;inset:0;background:var(--gold);transform:scale(0);border-radius:50%;transition:transform 0.4s ease;}
.soc-btn:hover{background:var(--gold);border-color:var(--gold);transform:scale(1.15) rotate(10deg);}
.soc-btn:hover::before{transform:scale(1);}
.soc-btn:hover svg{fill:#fff;position:relative;z-index:1;}
.soc-btn svg{width:14px;height:14px;fill:#1a1a1a;transition:all 0.3s;}
.f-bottom{border-top:1px solid rgba(0,0,0,.05);padding-top:22px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
.f-bottom p{font-size:11px;color:rgba(0,0,0,.4);}

/* === WHATSAPP FLOAT AVEC ANIMATIONS === */
.wa-float{position:fixed;bottom:26px;right:26px;width:54px;height:54px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:998;transition:all .4s cubic-bezier(0.34,1.56,0.64,1);border:none;animation:waPulse 2.5s infinite;}
@keyframes waPulse{0%{box-shadow:0 0 0 0 rgba(37,211,102,.6);}70%{box-shadow:0 0 0 20px rgba(37,211,102,0);}100%{box-shadow:0 0 0 0 rgba(37,211,102,0);}}
.wa-float:hover{transform:scale(1.2) rotate(10deg);animation:none;box-shadow:0 8px 25px rgba(37,211,102,.5);}
.wa-float:active{transform:scale(1.1);}
.wa-float svg{width:26px;height:26px;fill:#fff;transition:all 0.3s;}
.wa-float:hover svg{transform:rotate(-10deg) scale(1.1);}
[dir="rtl"] .wa-float{right:auto;left:26px;}

/* === MODAL AVEC ANIMATIONS AVANCÉES === */
.modal{display:none;position:fixed;inset:0;z-index:9999;align-items:center;justify-content:center;}
.modal.open{display:flex;}
.modal-ov{position:absolute;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);opacity:0;transition:opacity 0.3s;}
.modal.open .modal-ov{opacity:1;}
.modal-box{position:relative;z-index:1;background:#fff;border:1px solid rgba(201,148,58,.18);padding:44px;max-width:520px;width:92%;max-height:90vh;overflow-y:auto;opacity:0;transform:translateY(40px) scale(0.95) rotateX(5deg);transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 20px 60px rgba(0,0,0,.1);border-radius:8px;}
.modal.open .modal-box{opacity:1;transform:translateY(0) scale(1) rotateX(0);}
.modal-close{position:absolute;top:14px;right:14px;background:transparent;border:none;color:var(--grey);font-size:28px;cursor:pointer;line-height:1;transition:all .4s cubic-bezier(0.34,1.56,0.64,1);width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
[dir="rtl"] .modal-close{right:auto;left:14px;}
.modal-close:hover{color:var(--gold);background:rgba(201,148,58,0.1);transform:rotate(90deg) scale(1.1);}
.modal-title{font-family:var(--ff-display);font-size:28px;font-weight:700;margin-bottom:6px;color:#1a1a1a;opacity:0;animation:textReveal 0.5s 0.2s forwards;}
.modal-car{font-family:var(--ff-display);font-size:18px;color:var(--gold);margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid rgba(201,148,58,.14);opacity:0;animation:fadeInUp 0.5s 0.3s forwards;}
.modal-sub{font-size:13px;color:var(--grey);margin-bottom:26px;opacity:0;animation:fadeInUp 0.5s 0.4s forwards;}
.ff{margin-bottom:16px;opacity:0;animation:fadeInUp 0.5s forwards;}
.ff:nth-child(4){animation-delay:0.45s;}
.ff:nth-child(5){animation-delay:0.5s;}
.ff:nth-child(6){animation-delay:0.55s;}
.ff:nth-child(7){animation-delay:0.6s;}
.ff:nth-child(8){animation-delay:0.65s;}
.ff:nth-child(9){animation-delay:0.7s;}
.ff:nth-child(10){animation-delay:0.75s;}
.ff label{display:block;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:7px;transition:all 0.3s;}
.ff input,.ff select,.ff textarea{width:100%;background:#fafafa;border:1.5px solid rgba(201,148,58,.2);color:#1a1a1a;padding:12px 15px;font-family:var(--ff-body);font-size:13px;outline:none;transition:all .4s cubic-bezier(0.23,1,0.32,1);border-radius:4px;}
.ff input:focus,.ff select:focus,.ff textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,148,58,0.1);transform:translateY(-2px);}
.ff select option{background:#fff;}
.ff textarea{resize:vertical;min-height:80px;}
.ff input.error,.ff select.error{border-color:#e74c3c !important;animation:shake 0.5s;}
.error-msg{color:#e74c3c;font-size:10px;margin-top:4px;display:none;transition:all 0.3s;}
.error-msg.show{display:block;animation:fadeInDown 0.3s;}
.btn-wa-submit{width:100%;background:var(--green);color:#fff;border:none;padding:14px;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-top:16px;display:flex;align-items:center;justify-content:center;gap:10px;font-family:var(--ff-body);transition:all .4s cubic-bezier(0.23,1,0.32,1);white-space:nowrap;border-radius:4px;position:relative;overflow:hidden;opacity:0;animation:fadeInUp 0.5s 0.8s forwards;}
.btn-wa-submit::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);transition:left 0.6s;}
.btn-wa-submit:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(37,211,102,.4);}
.btn-wa-submit:hover::before{left:100%;}
.btn-wa-submit:active{transform:translateY(-1px);}
.btn-wa-submit svg{width:18px;height:18px;fill:#fff;flex-shrink:0;transition:all 0.3s;}
.btn-wa-submit:hover svg{transform:rotate(15deg) scale(1.1);}

/* === TOAST AVEC ANIMATIONS === */
.toast{position:fixed;bottom:86px;right:26px;background:#fff;border:1.5px solid var(--gold);padding:14px 22px;font-size:12px;color:#1a1a1a;z-index:9999;transform:translateY(20px) scale(0.9);opacity:0;transition:all .5s cubic-bezier(0.34,1.56,0.64,1);pointer-events:none;max-width:260px;box-shadow:0 8px 25px rgba(0,0,0,.12);border-radius:4px;}
[dir="rtl"] .toast{right:auto;left:26px;}
.toast.show{transform:translateY(0) scale(1);opacity:1;}
.toast.error{border-color:#e74c3c;}

/* === FADE UP OBSERVER === */
.fu{opacity:0;transform:translateY(30px);transition:all .8s cubic-bezier(0.23,1,0.32,1);}
.fu.vis{opacity:1;transform:translateY(0);}

/* === RESPONSIVE === */
@media(max-width:1100px){
  .cond-grid{grid-template-columns:repeat(2,1fr);}
  .how-grid{grid-template-columns:repeat(2,1fr);gap:30px;}
  .footer-inner{grid-template-columns:1fr 1fr;}
  .strip-grid{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:900px){
  .nav-links,.nav-right .btn-nav-cta{display:none;}
  .burger{display:flex;}
  .cars-grid{grid-template-columns:repeat(2,1fr);}
  .cond-grid{grid-template-columns:1fr;}
  .how-grid{grid-template-columns:1fr 1fr;}
  .footer-inner{grid-template-columns:1fr;}
  .strip-grid{grid-template-columns:1fr 1fr;}
  .car-img-wrap{height:160px;}
}
@media(max-width:600px){
  .cars-grid{grid-template-columns:1fr;}
  .how-grid{grid-template-columns:1fr;}
  .strip-grid{grid-template-columns:1fr;}
  .lang-float{bottom:10px;left:10px;gap:6px;}
  [dir="rtl"] .lang-float{left:auto;right:10px;}
  .lang-flag-btn{width:38px;height:38px;font-size:18px;}
  .modal-box{padding:28px 20px;}
  .car-img-wrap{height:200px;}
  .hero-inner{padding:60px 4% 40px;}
  .hero-sub{font-size:13px;line-height:1.6;}
  .hero-btns{flex-direction:column;gap:10px;}
  .btn-primary,.btn-outline{width:100%;justify-content:center;padding:16px 20px;}
  .footer-inner{gap:36px;}
  .cond-card{padding:28px 20px;}
  .testi-card{padding:24px 18px;}
  .step{padding:0 8px;}
  .step-num{width:56px;height:56px;}
  .step-num svg{width:22px;height:22px;}
  .season-toggle{max-width:100%;}
  .s-btn{font-size:9px;padding:10px 8px;letter-spacing:0;}
}
</style>
</head>
<body>

<div class="progress-bar" id="progressBar"></div>
<div class="toast" id="toast"></div>

<div class="lang-float">
  <button class="lang-flag-btn active" onclick="setLang('fr')" id="lang-fr" title="Français">🇫🇷</button>
  <button class="lang-flag-btn" onclick="setLang('en')" id="lang-en" title="English">🇬🇧</button>
  <button class="lang-flag-btn" onclick="setLang('ar')" id="lang-ar" title="العربية">🇸🇦</button>
</div>

<div class="modal" id="modal">
  <div class="modal-ov" onclick="closeModal()"></div>
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-title" id="m-title"></div>
    <div class="modal-car" id="m-car"></div>

let currentLang='fr',currentSeason='normal',currentCar='',tIdx=0,tCardW=0,reviewRating=0,autoSlideInterval=null;

function detectLang(){const s=localStorage.getItem('ruamsefeh_lang');if(s&&(s==='fr'||s==='en'||s==='ar'))return s;const l=(navigator.language||'fr').split('-')[0];return l==='ar'?'ar':l==='fr'?'fr':'en';}

function setLang(lang){
  currentLang=lang;
  localStorage.setItem('ruamsefeh_lang',lang);
  const t=i18n[lang];
  document.title="Ru Amsefeh - Location Voitures Marrakech";
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k=el.getAttribute('data-i18n');
    if(t[k]!==undefined)el.textContent=t[k];
  });
  const isAr=lang==='ar';
  document.documentElement.setAttribute('dir',isAr?'rtl':'ltr');
  document.documentElement.setAttribute('lang',lang);
  document.body.style.fontFamily=isAr?'var(--ff-ar)':'var(--ff-body)';
  document.querySelectorAll('.lang-flag-btn').forEach(b=>b.classList.remove('active'));
  const ab=document.getElementById('lang-'+lang);
  if(ab)ab.classList.add('active');
  buildCars();
  buildConditions();
  buildTestimonials();
  updateModalLabels();
  buildCarSelect();
  buildFromSelect();
  resetReviewRating();
  tIdx=0;
  requestAnimationFrame(()=>{
    setTimeout(initSlider,100);
  });
}

function setReviewRating(v){
  reviewRating=v;
  document.querySelectorAll('#review-stars .star').forEach((s,i)=>s.classList.toggle('active',i<v));
}
function resetReviewRating(){
  reviewRating=0;
  document.querySelectorAll('#review-stars .star').forEach(s=>s.classList.remove('active'));
}

function submitReview(){
  const t=i18n[currentLang],n=document.getElementById('rev-name').value.trim(),m=document.getElementById('rev-msg').value.trim(),e=document.getElementById('rev-error');
  e.classList.remove('show');
  if(!n){e.textContent=t.rev_error_name;e.classList.add('show');return;}
  if(!reviewRating){e.textContent=t.rev_error_rate;e.classList.add('show');return;}
  window.open('https://wa.me/212725950908?text='+encodeURIComponent(`مرحباً saidcars 👋\n\n*تقييم جديد*\n👤 ${n}\n${'⭐'.repeat(reviewRating)} ${reviewRating}/5${m?'\n📝 '+m:''}\n\nشكراً!`),'_blank');
  document.getElementById('rev-name').value='';
  document.getElementById('rev-msg').value='';
  resetReviewRating();
  showToast(t.rev_sent,'success');
}

function buildCars(){
  const t=i18n[currentLang],g=document.getElementById('cars-grid');
  if(!g)return;
  g.innerHTML='';
  const frag=document.createDocumentFragment();
  cars.forEach((c,i)=>{
    const p=currentSeason==='summer'?c.summer:c.price;
    const d=document.createElement('div');
    d.className='car-card';
    d.innerHTML=`${c.badge?`<span class="car-badge">${c.badge}</span>`:''}<div class="car-img-wrap" data-hover="${currentLang==='ar'?'عرض':'Voir'}"><img src="${c.img}" alt="${c.name}" loading="lazy" onload="this.parentElement.classList.add('loaded')" onerror="this.style.display='none';this.parentElement.innerHTML='<span style=color:var(--gold);font-family:var(--ff-display);font-size:14px;display:flex;align-items:center;justify-content:center;height:100%;>${c.name}</span>'"/></div><div class="car-info"><div class="car-name">${c.name}</div><div class="car-specs-row"><div class="car-spec"><svg viewBox="0 0 24 24" width="12" height="12" fill="var(--gold)"><circle cx="12" cy="12" r="10"/></svg>${c.gear}</div><div class="car-spec"><svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>${c.seats} ${currentLang==='ar'?'مقاعد':'places'}</div>${c.year?`<div class="car-spec"><svg viewBox="0 0 24 24"><path d="M20 3h-1V1h-2v2H7V1H5v2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>${c.year}</div>`:''}</div><div class="car-price-wrap"><div class="car-price">${p} DH</div><div class="car-price-unit">${t.per_day}</div></div>${currentSeason==='normal'?`<div class="car-price-summer">${currentLang==='ar'?`الصيف: ${c.summer} درهم`:`Été : ${c.summer} DH`}</div>`:''}<button class="btn-book-car" onclick="openModal('${c.name}')">${t.book_btn}</button></div>`;
    frag.appendChild(d);
  });
  g.appendChild(frag);
  requestAnimationFrame(()=>{
    const cards=g.querySelectorAll('.car-card');
    cards.forEach((c,i)=>{
      setTimeout(()=>c.classList.add('vis'),40+(i*15));
    });
  });
}

function buildTestimonials(){
  const t=i18n[currentLang],s=document.getElementById('tSlides');
  if(!s)return;
  s.innerHTML='';
  for(let i=1;i<=4;i++){
    const c=document.createElement('div');
    c.className='testi-card';
    c.innerHTML=`<div class="testi-stars">${'<svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>'.repeat(5)}</div><p class="testi-text">${t['t'+i+'_text']}</p><div class="testi-name">${t['t'+i+'_name']}</div><div class="testi-loc">${t['t'+i+'_loc']}</div>`;
    s.appendChild(c);
  }
}

function buildCarSelect(){
  const t=i18n[currentLang],s=document.getElementById('f-car');
  if(!s)return;
  s.innerHTML='';
  const opt=document.createElement('option');
  opt.value='';
  opt.textContent=t.car_choose;
  s.appendChild(opt);
  cars.forEach(c=>{
    const o=document.createElement('option');
    o.value=c.name;
    o.textContent=c.name;
    s.appendChild(o);
  });
  if(currentCar&&s.querySelector(`option[value="${currentCar}"]`))s.value=currentCar;
}

function buildFromSelect(){
  const t=i18n[currentLang],s=document.getElementById('f-from');
  if(!s||!t.from_options)return;
  const currentVal=s.value;
  s.innerHTML='';
  t.from_options.forEach((optText,i)=>{
    const o=document.createElement('option');
    o.value=['Marrakech','Aéroport Marrakech','Casablanca','Agadir','Rabat','Tanger','Fès','Autre'][i];
    o.textContent=optText;
    s.appendChild(o);
  });
  if(currentVal)s.value=currentVal;
}

function buildConditions(){
  const t=i18n[currentLang];
  ['cond1','cond2','cond3'].forEach(k=>{
    const l=document.getElementById(k+'-list');
    if(l){
      l.innerHTML='';
      t[k].forEach(i=>{
        const li=document.createElement('li');
        li.textContent=i;
        l.appendChild(li);
      });
    }
  });
}

function setSeason(s){
  currentSeason=s;
  document.getElementById('btn-normal').classList.toggle('active',s==='normal');
  document.getElementById('btn-summer').classList.toggle('active',s==='summer');
  buildCars();
}

function updateModalLabels(){
  const t=i18n[currentLang];
  document.getElementById('m-title').textContent=t.m_title;
  document.getElementById('m-sub').textContent=t.m_sub;
  document.getElementById('l-car').textContent=t.l_car;
  document.getElementById('l-name').textContent=t.l_name;
  document.getElementById('l-phone').textContent=t.l_phone;
  document.getElementById('l-from').textContent=t.l_from;
  document.getElementById('l-start').textContent=t.l_start;
  document.getElementById('l-end').textContent=t.l_end;
  document.getElementById('l-msg').textContent=t.l_msg;
  document.getElementById('m-btn-txt').textContent=t.m_btn;
}

function openModal(cn){
  currentCar=cn;
  updateModalLabels();
  buildCarSelect();
  buildFromSelect();
  document.getElementById('m-car').textContent=cn||(currentLang==='ar'?'سيارة':(currentLang==='en'?'Car':'Voiture'));
  clearErrors();
  document.getElementById('f-name').value='';
  document.getElementById('f-phone').value='';
  document.getElementById('f-start').value='';
  document.getElementById('f-end').value='';
  document.getElementById('f-msg').value='';
  if(cn)document.getElementById('f-car').value=cn;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow='';
  clearErrors();
}
function clearErrors(){
  document.querySelectorAll('.ff input.error, .ff select.error').forEach(e=>e.classList.remove('error'));
  document.querySelectorAll('.error-msg').forEach(e=>{
    e.classList.remove('show');
    e.textContent='';
  });
}
function showFieldError(fid,eid,m){
  const f=document.getElementById(fid),e=document.getElementById(eid);
  if(f)f.classList.add('error');
  if(e){
    e.textContent=m;
    e.classList.add('show');
  }
}

function validateAndSend(){
  clearErrors();
  const t=i18n[currentLang];
  let h=false;
  const c=document.getElementById('f-car').value,
    n=document.getElementById('f-name').value.trim(),
    p=document.getElementById('f-phone').value.trim(),
    f=document.getElementById('f-from').value,
    s=document.getElementById('f-start').value,
    e=document.getElementById('f-end').value,
    m=document.getElementById('f-msg').value.trim();
  if(!c){showFieldError('f-car','err-car',t.val_car);h=true;}
  if(!n){showFieldError('f-name','err-name',t.val_name);h=true;}
  if(!p||p.replace(/[\s\+\-\(\)]/g,'').length<8){showFieldError('f-phone','err-phone',t.val_phone);h=true;}
  if(!s||!e){showFieldError('f-start','err-start',t.val_dates);showFieldError('f-end','err-end','');h=true;}
  if(s&&e){
    const ds=new Date(s),de=new Date(e);
    if(de<=ds){showFieldError('f-end','err-end',t.val_end_before_start);h=true;}
    else if(Math.ceil((de-ds)/86400000)<3){showFieldError('f-end','err-end',t.val_min3);h=true;}
  }
  if(h){
    const fe=document.querySelector('.ff input.error, .ff select.error');
    if(fe)fe.scrollIntoView({behavior:'smooth',block:'center'});
    return;
  }
  window.open('https://wa.me/212725950908?text='+encodeURIComponent(t.wa_msg(n,c,f,s,e,m)),'_blank');
  closeModal();
  showToast(t.toast_msg,'success');
}

function openWA(){
  const g=currentLang==='ar'?'مرحباً saidcars 🚗':(currentLang==='en'?'Hello saidcars 🚗':'Bonjour saidcars 🚗');
  window.open('https://wa.me/212725950908?text='+encodeURIComponent(g),'_blank');
}
function showToast(m,tp){
  const tt=document.getElementById('toast');
  tt.textContent=m;
  tt.className='toast '+(tp==='error'?'error':'');
  tt.classList.add('show');
  setTimeout(()=>tt.classList.remove('show'),3500);
}
function toggleMenu(){
  document.getElementById('mobMenu').classList.toggle('open');
}

// Scroll avec parallax
window.addEventListener('scroll',()=>{
  const n=document.getElementById('mainNav');
  if(n)n.classList.toggle('scrolled',window.scrollY>80);
  document.getElementById('progressBar').style.width=(window.scrollY/(document.documentElement.scrollHeight-window.innerHeight)*100)+'%';
  
  // Parallax hero
  const heroBg=document.querySelector('.hero-bg img');
  if(heroBg&&window.scrollY<window.innerHeight){
    heroBg.style.transform=`translateY(${window.scrollY*0.3}px) scale(1.1)`;
  }
},{passive:true});

function initSlider(){
  const o=document.getElementById('tOuter'),s=document.getElementById('tSlides');
  if(!o||!s||s.children.length===0)return;
  const w=o.offsetWidth;
  if(w===0)return;
  const pv=w>960?3:w>600?2:1,gap=20;
  tCardW=(w-(gap*(pv-1)))/pv;
  Array.from(s.children).forEach(c=>{
    c.style.flex='0 0 '+tCardW+'px';
    c.style.minWidth=tCardW+'px';
    c.style.maxWidth=tCardW+'px';
  });
  slideTesti(0);
}

function slideTesti(dir){
  const s=document.getElementById('tSlides');
  if(!s||s.children.length===0)return;
  const w=document.getElementById('tOuter').offsetWidth;
  if(w===0)return;
  const pv=w>960?3:w>600?2:1;
  tIdx=Math.max(0,Math.min(tIdx+dir,Math.max(0,s.children.length-pv)));
  s.style.transform=`translateX(-${tIdx*(tCardW+20)}px)`;
}

// Auto-slide testimonials
function startAutoSlide(){
  if(autoSlideInterval)clearInterval(autoSlideInterval);
  autoSlideInterval=setInterval(()=>slideTesti(1),5000);
}
function stopAutoSlide(){
  if(autoSlideInterval){
    clearInterval(autoSlideInterval);
    autoSlideInterval=null;
  }
}

// Hover pause pour testimonials
document.addEventListener('DOMContentLoaded',()=>{
  const tOuter=document.getElementById('tOuter');
  if(tOuter){
    tOuter.addEventListener('mouseenter',stopAutoSlide);
    tOuter.addEventListener('mouseleave',startAutoSlide);
  }
});

const obs=new IntersectionObserver(e=>{
  e.forEach(x=>{
    if(x.isIntersecting)x.target.classList.add('vis');
  });
},{threshold:.08});

function observeAll(){
  document.querySelectorAll('.fu').forEach(el=>obs.observe(el));
}

document.addEventListener('DOMContentLoaded',()=>{
  const l=detectLang();
  currentLang=l;
  document.documentElement.setAttribute('dir',l==='ar'?'rtl':'ltr');
  document.documentElement.setAttribute('lang',l);
  document.body.style.fontFamily=l==='ar'?'var(--ff-ar)':'var(--ff-body)';
  setLang(l);
  observeAll();
  startAutoSlide();
});

window.addEventListener('resize',()=>{
  tIdx=0;
  setTimeout(initSlider,150);
},{passive:true});
</script>
</body>
</html>
