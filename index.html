<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="Location de voitures à Marrakech - Said Cars. Service 24/7, livraison aéroport gratuite. Prix à partir de 300 DH/jour."/>
<title>Ru Amsefeh - Location Voitures Marrakech</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Tajawal:wght@400;500;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --gold:#C9943A;--gold-l:#E8B86D;--gold-d:#8B6420;
  --dark:#f5f5f5;--dark2:#ffffff;--dark3:#fafafa;
  --white:#1a1a1a;--grey:#666;--grey2:#999;
  --green:#25D366;--bg:#ffffff;
  --ff-display:'Playfair Display',serif;
  --ff-ar:'Tajawal',sans-serif;
  --ff-body:'DM Sans',sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}
body{background:var(--bg);color:var(--white);font-family:var(--ff-body);overflow-x:hidden;min-width:320px;text-rendering:optimizeSpeed;}

[dir="rtl"]{font-family:var(--ff-ar);}
[dir="rtl"] .nav-links{flex-direction:row-reverse;}
[dir="rtl"] .hero-left{text-align:right;}
[dir="rtl"] .hero-btns{flex-direction:row-reverse;}
[dir="rtl"] .footer-contact a{flex-direction:row-reverse;}
[dir="rtl"] .car-spec{flex-direction:row-reverse;}
[dir="rtl"] .step-content{text-align:right;}
[dir="rtl"] .testi-card{text-align:right;}
[dir="rtl"] .testi-stars{justify-content:flex-end;}
[dir="rtl"] .star-rating{justify-content:flex-end;}

.progress-bar{position:fixed;top:0;left:0;height:2px;background:var(--gold);z-index:10000;width:0%;transition:width .1s ease;}

nav{position:fixed;top:0;left:0;right:0;z-index:999;height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 5%;background:rgba(255,255,255,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(201,148,58,.15);transition:all .3s ease;box-shadow:0 1px 3px rgba(0,0,0,.04);}
nav.scrolled{height:58px;box-shadow:0 4px 20px rgba(0,0,0,.08);}
.nav-logo{display:flex;align-items:center;text-decoration:none;}
.logo-emblem{width:80px;height:40px;overflow:hidden;border:1.5px solid var(--gold);flex-shrink:0;transition:all .3s ease;border-radius:4px;}
nav.scrolled .logo-emblem{width:65px;height:32px;}
.logo-emblem img{width:100%;height:100%;object-fit:cover;}
.nav-links{display:flex;align-items:center;gap:28px;list-style:none;}
.nav-links a{text-decoration:none;color:rgba(0,0,0,.6);font-size:12px;letter-spacing:1.8px;text-transform:uppercase;font-weight:500;transition:color .3s;position:relative;padding-bottom:2px;}
.nav-links a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1px;background:var(--gold);transition:width .3s;}
.nav-links a:hover,.nav-links a.active{color:var(--gold);}
.nav-links a:hover::after,.nav-links a.active::after{width:100%;}
.nav-right{display:flex;align-items:center;gap:10px;}
.btn-nav-cta{background:var(--gold);color:#fff;padding:9px 20px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border:none;cursor:pointer;transition:all .3s ease;clip-path:polygon(0 0,calc(100% - 7px) 0,100% 7px,100% 100%,7px 100%,0 calc(100% - 7px));white-space:nowrap;}
.btn-nav-cta:hover{background:var(--gold-l);transform:translateY(-2px);box-shadow:0 8px 20px rgba(201,148,58,.3);}
.nav-wa{width:36px;height:36px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;transition:transform .3s;flex-shrink:0;}
.nav-wa:hover{transform:scale(1.1);}
.nav-wa svg{width:18px;height:18px;fill:#fff;}
.burger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px;background:transparent;border:none;z-index:1000;}
.burger span{width:22px;height:1.5px;background:var(--white);transition:all .3s;display:block;}
.mob-menu{display:none;position:fixed;top:68px;left:0;right:0;background:rgba(255,255,255,.99);z-index:998;padding:24px 5%;flex-direction:column;gap:4px;border-bottom:1px solid rgba(201,148,58,.15);box-shadow:0 4px 10px rgba(0,0,0,.05);max-height:80vh;overflow-y:auto;}
.mob-menu.open{display:flex;}
.mob-menu a{color:rgba(0,0,0,.7);text-decoration:none;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;padding:12px 0;border-bottom:1px solid rgba(0,0,0,.04);}

#hero{position:relative;min-height:100vh;display:flex;align-items:center;overflow:hidden;padding-top:68px;background:#fafafa;}
.hero-bg{position:absolute;inset:0;}
.hero-bg img{width:100%;height:100%;object-fit:cover;opacity:1;filter:brightness(1.05);}
.hero-bg::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0.15);}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(201,148,58,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(201,148,58,.04) 1px,transparent 1px);background-size:70px 70px;z-index:1;}
.hero-inner{position:relative;z-index:2;width:100%;max-width:1280px;margin:0 auto;padding:80px 5%;}
.hero-pill{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(201,148,58,.6);padding:6px 18px;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:22px;background:rgba(255,255,255,.8);}
.hero-pill::before{content:'';width:6px;height:6px;background:var(--gold);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
h1.hero-title{font-family:var(--ff-display);font-size:clamp(38px,5vw,72px);line-height:1.1;font-weight:700;margin-bottom:10px;color:#1a1a1a;}
h1.hero-title em{font-style:italic;color:var(--gold);display:block;}
.hero-sub{color:rgba(0,0,0,.6);font-size:15px;line-height:1.85;margin-bottom:34px;max-width:600px;}
.hero-feats{display:flex;gap:20px;margin-bottom:38px;flex-wrap:wrap;}
.h-feat{display:flex;align-items:center;gap:7px;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:rgba(0,0,0,.7);}
.h-feat svg{width:14px;height:14px;fill:var(--gold);flex-shrink:0;}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap;}
.btn-primary{background:var(--gold);color:#fff;padding:14px 28px;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border:none;cursor:pointer;clip-path:polygon(0 0,calc(100% - 9px) 0,100% 9px,100% 100%,9px 100%,0 calc(100% - 9px));transition:all .3s ease;display:inline-flex;align-items:center;gap:9px;white-space:nowrap;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(201,148,58,.3);}
.btn-primary svg{width:16px;height:16px;fill:#fff;flex-shrink:0;}
.btn-outline{background:rgba(255,255,255,.8);color:#1a1a1a;padding:14px 28px;font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;border:1px solid rgba(0,0,0,.15);cursor:pointer;transition:all .3s;white-space:nowrap;}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}
.hero-bottom-note{position:absolute;bottom:28px;left:5%;z-index:2;display:flex;align-items:center;gap:10px;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(0,0,0,.5);}
.hero-bottom-note::before{content:'';width:28px;height:1px;background:var(--gold);}

.lang-float{position:fixed;bottom:26px;left:26px;z-index:997;display:flex;flex-direction:column;gap:8px;}
[dir="rtl"] .lang-float{left:auto;right:26px;}
.lang-flag-btn{width:44px;height:44px;border-radius:50%;border:2px solid rgba(201,148,58,.35);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;transition:all .3s;line-height:1;padding:0;overflow:hidden;}
.lang-flag-btn:hover{border-color:var(--gold);transform:scale(1.1);}
.lang-flag-btn.active{border-color:var(--gold);background:#fafafa;}

.star-rating{display:flex;gap:6px;}
.star-rating .star{cursor:pointer;transition:all .2s;fill:#ccc;width:28px;height:28px;}
.star-rating .star.active,.star-rating .star:hover{fill:var(--gold);transform:scale(1.2);}

.sec-head{text-align:center;margin-bottom:56px;}
.sec-label{display:inline-flex;align-items:center;gap:12px;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;}
.sec-label::before,.sec-label::after{content:'';width:24px;height:1px;background:var(--gold-d);transition:width .6s ease;}
.sec-head:hover .sec-label::before,.sec-head:hover .sec-label::after{width:48px;}
.sec-title{font-family:var(--ff-display);font-size:clamp(28px,3.8vw,52px);font-weight:700;line-height:1.1;color:#1a1a1a;}
.sec-title em{font-style:italic;color:var(--gold);}
.sec-sub{color:var(--grey);font-size:14px;margin-top:10px;}

#cars{padding:96px 5%;background:var(--bg);}
.season-toggle{display:flex;justify-content:center;margin-bottom:40px;border:1px solid rgba(201,148,58,.3);max-width:300px;margin-left:auto;margin-right:auto;border-radius:4px;overflow:hidden;}
.s-btn{flex:1;padding:10px 12px;background:transparent;border:none;color:var(--grey);font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .3s;font-family:var(--ff-body);white-space:nowrap;}
.s-btn.active{background:var(--gold);color:#fff;}
.cars-grid{max-width:1300px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.car-card{background:#fff;position:relative;overflow:hidden;cursor:pointer;transition:transform .3s ease,box-shadow .3s ease;opacity:0;transform:translateY(60px);border:1px solid rgba(0,0,0,.06);border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.03);display:flex;flex-direction:column;will-change:transform;}
.car-card.vis{opacity:1;transform:translateY(0);transition:all .5s ease;}
.car-card:nth-child(1).vis{transition-delay:.04s;}
.car-card:nth-child(2).vis{transition-delay:.08s;}
.car-card:nth-child(3).vis{transition-delay:.12s;}
.car-card:nth-child(4).vis{transition-delay:.16s;}
.car-card:nth-child(5).vis{transition-delay:.2s;}
.car-card:nth-child(6).vis{transition-delay:.24s;}
.car-card:nth-child(7).vis{transition-delay:.28s;}
.car-card:nth-child(8).vis{transition-delay:.32s;}
.car-card:nth-child(9).vis{transition-delay:.36s;}
.car-card:nth-child(10).vis{transition-delay:.4s;}
.car-card:nth-child(11).vis{transition-delay:.44s;}
.car-card:nth-child(12).vis{transition-delay:.48s;}
.car-card:hover{transform:translateY(-5px);box-shadow:0 8px 25px rgba(0,0,0,.08);}
.car-badge{position:absolute;top:14px;right:14px;background:var(--gold);color:#fff;font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;z-index:3;border-radius:2px;}
[dir="rtl"] .car-badge{right:auto;left:14px;}
.car-img-wrap{width:100%;height:180px;overflow:hidden;background:#f0f0f0;position:relative;}
.car-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .4s ease;will-change:transform;}
.car-card:hover .car-img-wrap img{transform:scale(1.06);}
.car-info{padding:16px;display:flex;flex-direction:column;flex:1;}
.car-name{font-family:var(--ff-display);font-size:18px;font-weight:700;margin-bottom:8px;color:#1a1a1a;}
.car-specs-row{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.car-spec{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--grey);}
.car-spec svg{width:12px;height:12px;fill:var(--gold);flex-shrink:0;}
.car-price-wrap{display:flex;align-items:baseline;gap:8px;margin-top:auto;}
.car-price{font-size:24px;font-weight:700;color:var(--gold);font-family:var(--ff-display);}
.car-price-unit{font-size:12px;color:var(--grey);}
.car-price-summer{font-size:10px;color:var(--grey2);margin-top:2px;}
.btn-book-car{width:100%;margin-top:12px;background:transparent;border:1px solid var(--gold);color:var(--gold);padding:10px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .3s ease;font-family:var(--ff-body);white-space:nowrap;border-radius:4px;}
.btn-book-car:hover{background:var(--gold);color:#fff;}

#conditions{padding:96px 5%;background:#fafafa;position:relative;overflow:hidden;}
.cond-grid{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.cond-card{background:#fff;padding:40px 30px;position:relative;overflow:hidden;transition:transform .4s ease,box-shadow .4s ease;border:1px solid rgba(0,0,0,.04);border-radius:6px;}
.cond-card:hover{transform:translateY(-8px);box-shadow:0 20px 50px rgba(201,148,58,.1);}
.cond-icon{width:50px;height:50px;border:1px solid rgba(201,148,58,.3);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:22px;transition:transform .4s ease;}
.cond-card:hover .cond-icon{transform:rotate(360deg) scale(1.1);}
.cond-icon svg{width:24px;height:24px;fill:var(--gold);}
.cond-title{font-family:var(--ff-display);font-size:18px;font-weight:700;color:var(--gold);margin-bottom:14px;}
.cond-list{list-style:none;}
.cond-list li{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:rgba(0,0,0,.6);line-height:1.7;margin-bottom:8px;}
.cond-list li::before{content:'▸';color:var(--gold);font-size:10px;margin-top:4px;flex-shrink:0;}
[dir="rtl"] .cond-list li{flex-direction:row-reverse;}
[dir="rtl"] .cond-icon{margin-left:auto;margin-right:0;}
[dir="rtl"] .cond-card{text-align:right;}

#how{padding:96px 5%;background:#fff;}
.how-grid{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:0;position:relative;}
.step{text-align:center;padding:0 18px;position:relative;z-index:1;}
.step-num{width:70px;height:70px;border:1px solid var(--gold);background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 22px;}
.step-num svg{width:28px;height:28px;fill:var(--gold);}
.step-title{font-size:14px;font-weight:600;color:#1a1a1a;margin-bottom:8px;}
.step-text{font-size:12px;color:var(--grey);line-height:1.7;}

#testi{padding:96px 5%;background:#fafafa;}
.testi-wrap{max-width:1100px;margin:0 auto;}
.testi-slides-outer{overflow:hidden;width:100%;}
.testi-slides{display:flex;gap:20px;transition:transform .5s ease;width:100%;}
.testi-card{flex:0 0 auto;background:#fff;padding:32px;border:1px solid rgba(0,0,0,.04);position:relative;transition:transform .3s ease,box-shadow .3s ease;box-shadow:0 2px 8px rgba(0,0,0,.02);border-radius:6px;}
.testi-card:hover{transform:translateY(-4px);box-shadow:0 10px 30px rgba(201,148,58,.08);}
.testi-card::before{content:'\201C';position:absolute;top:18px;right:22px;font-family:var(--ff-display);font-size:72px;color:rgba(201,148,58,.1);line-height:1;}
[dir="rtl"] .testi-card::before{right:auto;left:22px;content:'\201D';}
.testi-stars{display:flex;gap:3px;margin-bottom:16px;}
.testi-stars svg{width:16px;height:16px;fill:var(--gold);flex-shrink:0;}
.testi-text{font-size:13px;color:rgba(0,0,0,.6);line-height:1.85;margin-bottom:20px;font-style:italic;}
.testi-name{font-size:13px;font-weight:600;color:#1a1a1a;}
.testi-loc{font-size:10px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-top:3px;}
.testi-nav{display:flex;justify-content:center;gap:10px;margin-top:36px;}
.t-btn{width:42px;height:42px;border:1px solid rgba(201,148,58,.3);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;border-radius:50%;}
.t-btn:hover{background:var(--gold);border-color:var(--gold);}
.t-btn:hover svg{fill:#fff;}
.t-btn svg{width:16px;height:16px;fill:#1a1a1a;}

#add-review{padding:60px 5%;background:#fff;border-top:1px solid rgba(201,148,58,.1);}
.review-form-wrap{max-width:600px;margin:0 auto;}
.review-form-wrap h3{font-family:var(--ff-display);font-size:24px;text-align:center;margin-bottom:8px;color:#1a1a1a;}
.review-form-wrap h3 em{color:var(--gold);font-style:italic;}
.rev-ff{margin-bottom:16px;}
.rev-ff label{display:block;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:7px;}
.rev-ff input,.rev-ff textarea{width:100%;background:#fafafa;border:1px solid rgba(201,148,58,.2);color:#1a1a1a;padding:12px 15px;font-family:var(--ff-body);font-size:13px;outline:none;transition:border-color .3s;border-radius:4px;}
.rev-ff input:focus,.rev-ff textarea:focus{border-color:var(--gold);}
.rev-ff textarea{resize:vertical;min-height:80px;}
.rev-rating-wrap{display:flex;align-items:center;gap:14px;margin-bottom:20px;justify-content:center;flex-wrap:wrap;}
.rev-rating-wrap span{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--grey);}
.btn-submit-review{width:100%;background:var(--gold);color:#fff;padding:14px;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border:none;cursor:pointer;transition:all .3s ease;font-family:var(--ff-body);border-radius:4px;}
.btn-submit-review:hover{background:var(--gold-l);transform:translateY(-2px);box-shadow:0 10px 30px rgba(201,148,58,.3);}
.rev-error{color:#e74c3c;font-size:10px;text-align:center;margin-top:8px;display:none;}
.rev-error.show{display:block;}

#strip{padding:44px 5%;background:#fff;border-top:1px solid rgba(201,148,58,.1);border-bottom:1px solid rgba(201,148,58,.1);}
.strip-grid{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:36px;}
.strip-item{display:flex;align-items:center;gap:14px;}
.strip-icon{width:44px;height:44px;flex-shrink:0;border:1px solid rgba(201,148,58,.28);border-radius:50%;display:flex;align-items:center;justify-content:center;}
.strip-icon svg{width:20px;height:20px;fill:var(--gold);}
.strip-t{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:3px;}
.strip-s{font-size:11px;color:var(--grey);}
[dir="rtl"] .strip-item{flex-direction:row-reverse;text-align:right;}

.address-footer{text-align:center;padding:20px 5%;background:#fff;border-top:1px solid rgba(201,148,58,.15);}
.address-footer p{font-family:var(--ff-display);font-size:16px;color:var(--gold);letter-spacing:1px;font-weight:700;font-style:italic;}

footer{background:#fafafa;padding:60px 5% 28px;border-top:1px solid rgba(201,148,58,.08);}
.footer-inner{max-width:1300px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr;gap:60px;margin-bottom:50px;}
.f-brand{font-family:var(--ff-display);font-size:24px;font-weight:700;color:var(--gold);letter-spacing:3px;display:block;margin-bottom:3px;}
.f-brand small{color:var(--grey);font-size:9px;letter-spacing:4px;text-transform:uppercase;font-family:var(--ff-body);}
.f-desc{color:var(--grey);font-size:13px;line-height:1.8;margin-top:14px;max-width:280px;}
.f-contact{margin-top:22px;}
.f-contact a{display:flex;align-items:center;gap:9px;color:var(--grey);font-size:13px;text-decoration:none;margin-bottom:9px;transition:color .3s;}
.f-contact a:hover{color:var(--gold);}
.f-contact svg{width:14px;height:14px;fill:var(--gold);flex-shrink:0;}
[dir="rtl"] .f-contact a{flex-direction:row-reverse;}
.f-col h4{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:22px;}
.f-col ul{list-style:none;}
.f-col li{margin-bottom:9px;}
.f-col a{color:var(--grey);text-decoration:none;font-size:13px;transition:color .3s;}
.socials{display:flex;gap:10px;margin-top:18px;}
.soc-btn{width:36px;height:36px;border:1px solid rgba(201,148,58,.28);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;text-decoration:none;border-radius:50%;}
.soc-btn:hover{background:var(--gold);border-color:var(--gold);}
.soc-btn:hover svg{fill:#fff;}
.soc-btn svg{width:14px;height:14px;fill:#1a1a1a;}
.f-bottom{border-top:1px solid rgba(0,0,0,.05);padding-top:22px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
.f-bottom p{font-size:11px;color:rgba(0,0,0,.4);}

.wa-float{position:fixed;bottom:26px;right:26px;width:54px;height:54px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:998;transition:transform .3s;border:none;animation:waPulse 2.5s infinite;}
@keyframes waPulse{0%{box-shadow:0 0 0 0 rgba(37,211,102,.6);}70%{box-shadow:0 0 0 20px rgba(37,211,102,0);}100%{box-shadow:0 0 0 0 rgba(37,211,102,0);}}
.wa-float:hover{transform:scale(1.1);animation:none;box-shadow:0 4px 18px rgba(37,211,102,.4);}
.wa-float svg{width:26px;height:26px;fill:#fff;}
[dir="rtl"] .wa-float{right:auto;left:26px;}

.modal{display:none;position:fixed;inset:0;z-index:9999;align-items:center;justify-content:center;}
.modal.open{display:flex;}
.modal-ov{position:absolute;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
.modal-box{position:relative;z-index:1;background:#fff;border:1px solid rgba(201,148,58,.18);padding:44px;max-width:520px;width:92%;max-height:90vh;overflow-y:auto;animation:modalIn .3s ease;box-shadow:0 20px 60px rgba(0,0,0,.1);border-radius:8px;}
@keyframes modalIn{from{opacity:0;transform:translateY(30px) scale(.95);}to{opacity:1;transform:translateY(0) scale(1);}}
.modal-close{position:absolute;top:14px;right:14px;background:transparent;border:none;color:var(--grey);font-size:22px;cursor:pointer;line-height:1;transition:color .3s;}
[dir="rtl"] .modal-close{right:auto;left:14px;}
.modal-close:hover{color:#1a1a1a;}
.modal-title{font-family:var(--ff-display);font-size:28px;font-weight:700;margin-bottom:6px;color:#1a1a1a;}
.modal-car{font-family:var(--ff-display);font-size:18px;color:var(--gold);margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid rgba(201,148,58,.14);}
.modal-sub{font-size:13px;color:var(--grey);margin-bottom:26px;}
.ff{margin-bottom:16px;}
.ff label{display:block;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:7px;}
.ff input,.ff select,.ff textarea{width:100%;background:#fafafa;border:1px solid rgba(201,148,58,.2);color:#1a1a1a;padding:12px 15px;font-family:var(--ff-body);font-size:13px;outline:none;transition:border-color .3s;border-radius:4px;}
.ff input:focus,.ff select:focus,.ff textarea:focus{border-color:var(--gold);}
.ff select option{background:#fff;}
.ff textarea{resize:vertical;min-height:80px;}
.ff input.error,.ff select.error{border-color:#e74c3c !important;}
.error-msg{color:#e74c3c;font-size:10px;margin-top:4px;display:none;}
.error-msg.show{display:block;}
.btn-wa-submit{width:100%;background:var(--green);color:#fff;border:none;padding:14px;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-top:16px;display:flex;align-items:center;justify-content:center;gap:10px;font-family:var(--ff-body);transition:opacity .3s;white-space:nowrap;border-radius:4px;}
.btn-wa-submit:hover{opacity:.9;}
.btn-wa-submit svg{width:18px;height:18px;fill:#fff;flex-shrink:0;}

.toast{position:fixed;bottom:86px;right:26px;background:#fff;border:1px solid var(--gold);padding:14px 22px;font-size:12px;color:#1a1a1a;z-index:9999;transform:translateY(16px);opacity:0;transition:all .4s;pointer-events:none;max-width:260px;box-shadow:0 4px 15px rgba(0,0,0,.1);border-radius:4px;}
[dir="rtl"] .toast{right:auto;left:26px;}
.toast.show{transform:translateY(0);opacity:1;}

.fu{opacity:0;transform:translateY(24px);transition:opacity .6s ease,transform .6s ease;}
.fu.vis{opacity:1;transform:translateY(0);}

@media(max-width:1100px){
  .cond-grid{grid-template-columns:repeat(2,1fr);}
  .how-grid{grid-template-columns:repeat(2,1fr);gap:30px;}

  .lang-flag-btn{width:38px;height:38px;font-size:18px;}

  .hero-inner{padding:60px 4% 40px;}

  .hero-btns{flex-direction:column;gap:10px;}

/* ===== ENHANCED ANIMATIONS & EFFECTS ===== */

/* Smooth transitions */
:root {
  --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-smooth: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-bounce: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  --transition-elastic: 0.6s cubic-bezier(0.68, -0.6, 0.32, 1.6);
}

/* Enhanced Navbar */
nav {
  background: rgba(255,255,255,.96);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  transition: all var(--transition-smooth);
}
nav.scrolled {
  height: 58px;
  box-shadow: 0 4px 20px rgba(0,0,0,.08);
}

/* Logo Animation */
.logo-emblem {
  transition: all var(--transition-smooth);
  overflow: hidden;
}
.logo-emblem:hover {
  transform: scale(1.05);
  box-shadow: 0 4px 15px rgba(201,148,58,.2);
}
.logo-emblem img {
  transition: transform var(--transition-smooth);
}
.logo-emblem:hover img {
  transform: scale(1.1);
}

/* Nav Links Enhanced */
.nav-links a {
  position: relative;
  transition: color var(--transition-fast);
}
.nav-links a::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  width: 0;
  height: 2px;
  background: var(--gold);
  transition: all var(--transition-smooth);
  transform: translateX(-50%);
}
.nav-links a:hover::after,
.nav-links a.active::after {
  width: 100%;
}
.nav-links a:hover {
  color: var(--gold);
  transform: translateY(-2px);
}

/* CTA Button Enhanced */
.btn-nav-cta {
  position: relative;
  overflow: hidden;
  transition: all var(--transition-smooth);
}
.btn-nav-cta::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.3), transparent);
  transition: left 0.6s ease;
}
.btn-nav-cta:hover::before {
  left: 100%;
}
.btn-nav-cta:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 30px rgba(201,148,58,.4);
}

/* WhatsApp Button Enhanced */
.nav-wa {
  transition: all var(--transition-bounce);
}
.nav-wa:hover {
  transform: scale(1.15) rotate(10deg);
  box-shadow: 0 4px 15px rgba(37,211,102,.3);
}

/* Hero Section Enhanced */
#hero {
  position: relative;
  overflow: hidden;
}
.hero-bg img {
  transition: transform 8s ease;
}
#hero:hover .hero-bg img {
  transform: scale(1.05);
}
.hero-pill {
  transition: all var(--transition-smooth);
}
.hero-pill:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 15px rgba(201,148,58,.2);
}
.hero-pill::before {
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: .3; transform: scale(0.8); }
}

/* Hero Title Animation */
.hero-title {
  animation: slideInLeft 1s ease forwards;
  opacity: 0;
}
@keyframes slideInLeft {
  from { opacity: 0; transform: translateX(-60px); }
  to { opacity: 1; transform: translateX(0); }
}
.hero-title em {
  position: relative;
  display: inline-block;
}
.hero-title em::after {
  content: '';
  position: absolute;
  bottom: -5px;
  left: 0;
  width: 100%;
  height: 3px;
  background: var(--gold);
  border-radius: 2px;
  animation: expandWidth 1s ease 0.5s forwards;
  transform-origin: left;
  transform: scaleX(0);
}
@keyframes expandWidth {
  to { transform: scaleX(1); }
}

.hero-sub {
  animation: fadeInUp 1s ease 0.3s forwards;
  opacity: 0;
}
.hero-feats {
  animation: fadeInUp 1s ease 0.6s forwards;
  opacity: 0;
}
.hero-btns {
  animation: fadeInUp 1s ease 0.9s forwards;
  opacity: 0;
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Hero Features Enhanced */
.h-feat {
  transition: all var(--transition-smooth);
  padding: 8px 12px;
  border-radius: 8px;
}
.h-feat:hover {
  background: rgba(201,148,58,.1);
  transform: translateY(-3px);
}
.h-feat svg {
  transition: transform var(--transition-bounce);
}
.h-feat:hover svg {
  transform: scale(1.2) rotate(10deg);
}

/* Primary Button Enhanced */
.btn-primary {
  position: relative;
  overflow: hidden;
  transition: all var(--transition-smooth);
}
.btn-primary::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.3), transparent);
  transition: left 0.6s ease;
}
.btn-primary:hover::before {
  left: 100%;
}
.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 30px rgba(201,148,58,.4);
}
.btn-primary svg {

}
.btn-primary:hover svg {

.sec-label {

.car-badge {

.car-card:hover .car-badge {

.car-price {

/* Book Button Enhanced */
.btn-book-car {
  position: relative;

}
.btn-book-car::before {
  content: '';

/* Condition Cards Enhanced */
.cond-card {
  transition: all var(--transition-smooth);

@keyframes toastIn {
  from { opacity: 0; transform: translateY(20px) scale(0.9); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.toast.error {
  border-left-color: #e74c3c;
}
.toast.success {
  border-left-color: #2ecc71;
}

/* Language Buttons Enhanced */
.lang-flag-btn {
  transition: all var(--transition-bounce);
}
.lang-flag-btn:hover {
  transform: scale(1.15) rotate(5deg);
  border-color: var(--gold);
  box-shadow: 0 4px 15px rgba(201,148,58,.2);
}
.lang-flag-btn.active {
  transform: scale(1.1);
  box-shadow: 0 4px 15px rgba(201,148,58,.3);
}

/* Progress Bar Enhanced */
.progress-bar {
  transition: width 0.1s ease;
  background: linear-gradient(90deg, var(--gold), var(--gold-l));
}

/* Mobile Menu Enhanced */
.mob-menu.open {
  animation: slideDown 0.3s ease;
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}
.mob-menu a {
  transition: all var(--transition-fast);
}
.mob-menu a:hover {
  color: var(--gold);
  padding-left: 10px;
  background: rgba(201,148,58,.05);
}

/* Burger Animation */
.burger span {
  transition: all var(--transition-smooth);
}
.burger.active span:nth-child(1) {
  transform: rotate(45deg) translate(5px, 5px);
}
.burger.active span:nth-child(2) {
  opacity: 0;
  transform: translateX(-10px);
}
.burger.active span:nth-child(3) {
  transform: rotate(-45deg) translate(5px, -5px);
}

/* Custom Scrollbar */
::-webkit-scrollbar {
  width: 8px;
}
::-webkit-scrollbar-track {
  background: #f5f5f5;
}
::-webkit-scrollbar-thumb {
  background: var(--gold);
  border-radius: 4px;
}
::-webkit-scrollbar-thumb:hover {
  background: var(--gold-d);
}

/* Address Footer Enhanced */
.address-footer {
  transition: all var(--transition-smooth);
}
.address-footer:hover {
  background: rgba(201,148,58,.05);
}
.address-footer p {
  transition: all var(--transition-fast);
}
.address-footer:hover p {
  transform: scale(1.02);
}

/* Footer Bottom Enhanced */
.f-bottom {
  transition: all var(--transition-smooth);
}

/* Star Rating Enhanced */
.star-rating .star {
  transition: all var(--transition-bounce);
}
.star-rating .star:hover ~ .star {
  fill: #ccc !important;
  transform: scale(1) !important;
}

/* Car Specs Enhanced */
.car-spec {
  transition: all var(--transition-fast);
}
.car-card:hover .car-spec {
  color: var(--gold-d);
}
.car-spec svg {
  transition: transform var(--transition-bounce);
}
.car-card:hover .car-spec svg {
  transform: scale(1.2);
}

/* Price Wrap Enhanced */
.car-price-wrap {
  transition: all var(--transition-fast);
}
.car-card:hover .car-price-wrap {
  transform: translateY(-2px);
}

/* Summer Price Enhanced */
.car-price-summer {
  transition: all var(--transition-fast);
}
.car-card:hover .car-price-summer {
  color: var(--gold-d);
}

/* Step Content Enhanced */
.step-content {
  transition: all var(--transition-smooth);
}
.step:hover .step-content {
  transform: translateY(-3px);
}
.step-title {
  transition: color var(--transition-fast);
}
.step:hover .step-title {
  color: var(--gold);
}

/* Testimonial Name Enhanced */
.testi-name {
  transition: color var(--transition-fast);
}
.testi-card:hover .testi-name {
  color: var(--gold);
}
.testi-loc {
  transition: all var(--transition-fast);
}
.testi-card:hover .testi-loc {
  letter-spacing: 3px;
}

/* Review Subtitle Enhanced */
.rev-sub {
  transition: all var(--transition-fast);
}
.review-form-wrap:hover .rev-sub {
  color: var(--gold);
}

/* Strip Text Enhanced */
.strip-t {
  transition: color var(--transition-fast);
}
.strip-item:hover .strip-t {
  color: var(--gold);
}
.strip-s {
  transition: all var(--transition-fast);
}
.strip-item:hover .strip-s {
  color: var(--gold-d);
}

/* Footer Brand Small Enhanced */
.f-brand small {
  transition: all var(--transition-fast);
}
.f-brand:hover small {
  color: var(--gold);
}

/* Footer Description Enhanced */
.f-desc {
  transition: all var(--transition-fast);
}
.f-desc:hover {
  color: var(--gold-d);
}

/* Footer Column Header Enhanced */
.f-col h4 {
  transition: all var(--transition-fast);
}
.f-col:hover h4 {
  color: var(--gold-l);
  letter-spacing: 4px;
}

/* Footer Bottom Text Enhanced */
.f-bottom p {
  transition: all var(--transition-fast);
}
.f-bottom:hover p {
  color: var(--gold);
}

/* Hero Bottom Note Enhanced */
.hero-bottom-note {
  transition: all var(--transition-smooth);
}
.hero-bottom-note:hover {
  color: var(--gold);
}
.hero-bottom-note::before {
  transition: all var(--transition-smooth);
}
.hero-bottom-note:hover::before {
  width: 40px;
  background: var(--gold-l);
}

/* Smooth Scroll Behavior */
html {
  scroll-behavior: smooth;
}

/* Selection Color */
::selection {
  background: rgba(201,148,58,.3);
  color: #1a1a1a;
}

/* Focus Visible */

  outline: 2px solid var(--gold);
  outline-offset: 2px;
}

/* Reduced Motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

<script>

// ===== ENHANCED SCROLL ANIMATIONS =====
const observerOptions = {
  threshold: 0.08,
  rootMargin: '0px 0px -50px 0px'
};

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('vis');
    }
  });
}, observerOptions);

function observeAll() {
  document.querySelectorAll('.fu').forEach(el => observer.observe(el));
}

// ===== PARALLAX EFFECT ON HERO =====
window.addEventListener('scroll', () => {
  const heroBg = document.querySelector('.hero-bg img');
  if (heroBg) {
    const scrolled = window.scrollY;
    const rate = scrolled * 0.3;
    heroBg.style.transform = `translateY(${rate}px) scale(1.05)`;
  }
}, { passive: true });

// ===== ENHANCED NAVBAR SCROLL =====
window.addEventListener('scroll', () => {
  const nav = document.getElementById('mainNav');
  const progressBar = document.getElementById('progressBar');

  if (nav) {
    nav.classList.toggle('scrolled', window.scrollY > 80);
  }

  if (progressBar) {
    const scrollPercent = (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100;
    progressBar.style.width = scrollPercent + '%';
  }
}, { passive: true });

// ===== ENHANCED MOBILE MENU =====
function toggleMenu() {
  const menu = document.getElementById('mobMenu');
  const burger = document.getElementById('burger');
  menu.classList.toggle('open');
  burger.classList.toggle('active');
  document.body.style.overflow = menu.classList.contains('open') ? 'hidden' : '';
}

// ===== ENHANCED MODAL =====
function openModal(cn) {
  currentCar = cn;
  updateModalLabels();
  buildCarSelect();
  document.getElementById('m-car').textContent = cn || (currentLang === 'ar' ? 'سيارة' : 'Voiture');
  clearErrors();
  document.getElementById('f-name').value = '';
  document.getElementById('f-phone').value = '';
  document.getElementById('f-start').value = '';
  document.getElementById('f-end').value = '';
  document.getElementById('f-msg').value = '';
  if (cn) document.getElementById('f-car').value = cn;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
  clearErrors();
}

// Close modal on backdrop click
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this || e.target.classList.contains('modal-ov')) {
    closeModal();
  }
});

// Close modal on Escape key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeModal();
  }
});

// ===== ENHANCED TOAST =====
function showToast(m, tp) {
  const tt = document.getElementById('toast');
  tt.textContent = m;
  tt.className = 'toast ' + (tp === 'error' ? 'error' : tp === 'success' ? 'success' : '');
  tt.classList.add('show');

  // Auto hide after 3.5 seconds
  setTimeout(() => {
    tt.classList.remove('show');
  }, 3500);
}

// ===== ENHANCED CARDS ANIMATION ON LOAD =====
function buildCars() {
  const t = i18n[currentLang];
  const g = document.getElementById('cars-grid');
  if (!g) return;
  g.innerHTML = '';
  const frag = document.createDocumentFragment();

  cars.forEach((c, i) => {
    const p = currentSeason === 'summer' ? c.summer : c.price;
    const d = document.createElement('div');
    d.className = 'car-card';
    d.innerHTML = `
      ${c.badge ? `<span class="car-badge">${c.badge}</span>` : ''}
      <div class="car-img-wrap">
        <img src="${c.img}" alt="${c.name}" loading="lazy" onerror="this.style.display='none';this.parentElement.innerHTML='<span style=color:var(--gold)>${c.name}</span>'"/>
      </div>
      <div class="car-info">
        <div class="car-name">${c.name}</div>
        <div class="car-specs-row">
          <div class="car-spec">
            <svg viewBox="0 0 24 24" width="12" height="12" fill="var(--gold)">
              <circle cx="12" cy="12" r="10"/>
            </svg>
            ${c.gear}
          </div>
          <div class="car-spec">
            <svg viewBox="0 0 24 24">
              <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
            </svg>
            ${c.seats} ${currentLang === 'ar' ? 'مقاعد' : 'places'}
          </div>
          ${c.year ? `
          <div class="car-spec">
            <svg viewBox="0 0 24 24">
              <path d="M20 3h-1V1h-2v2H7V1H5v2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/>
            </svg>
            ${c.year}
          </div>` : ''}
        </div>
        <div class="car-price-wrap">
          <div class="car-price">${p} DH</div>
          <div class="car-price-unit">${t.per_day}</div>
        </div>
        ${currentSeason === 'normal' ? `<div class="car-price-summer">${currentLang === 'ar' ? `الصيف: ${c.summer} درهم` : `Été : ${c.summer} DH`}</div>` : ''}
        <button class="btn-book-car" onclick="openModal('${c.name}')">${t.book_btn}</button>
      </div>
    `;
    frag.appendChild(d);
  });

  g.appendChild(frag);

  // Staggered animation
  requestAnimationFrame(() => {
    const cards = g.querySelectorAll('.car-card');
    cards.forEach((c, i) => {
      setTimeout(() => c.classList.add('vis'), 40 + (i * 15));
    });
  });
}

// ===== ENHANCED TESTIMONIALS =====
function buildTestimonials() {
  const t = i18n[currentLang];
  const s = document.getElementById('tSlides');
  if (!s) return;
  s.innerHTML = '';

  for (let i = 1; i <= 4; i++) {
    const c = document.createElement('div');
    c.className = 'testi-card';
    c.innerHTML = `
      <div class="testi-stars">
        ${'<svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>'.repeat(5)}
      </div>
      <p class="testi-text">${t['t' + i + '_text']}</p>
      <div class="testi-name">${t['t' + i + '_name']}</div>
      <div class="testi-loc">${t['t' + i + '_loc']}</div>
    `;
    s.appendChild(c);
  }

  initSlider();
}

// ===== ENHANCED SLIDER =====
function initSlider() {
  const o = document.getElementById('tOuter');
  const s = document.getElementById('tSlides');
  if (!o || !s || s.children.length === 0) return;

  const w = o.offsetWidth;
  const pv = w > 960 ? 3 : w > 600 ? 2 : 1;
  const gap = 20;
  tCardW = (w - (gap * (pv - 1))) / pv;

  Array.from(s.children).forEach(c => {
    c.style.flex = '0 0 ' + tCardW + 'px';
    c.style.minWidth = tCardW + 'px';
    c.style.maxWidth = tCardW + 'px';
  });

  slideTesti(0);
}

function slideTesti(dir) {
  const s = document.getElementById('tSlides');
  if (!s || s.children.length === 0) return;

  const w = document.getElementById('tOuter').offsetWidth;
  const pv = w > 960 ? 3 : w > 600 ? 2 : 1;
  tIdx = Math.max(0, Math.min(tIdx + dir, Math.max(0, s.children.length - pv)));
  s.style.transform = `translateX(-${tIdx * (tCardW + 20)}px)`;
}

// ===== ENHANCED REVIEW SUBMISSION =====
function submitReview() {
  const t = i18n[currentLang];
  const n = document.getElementById('rev-name').value.trim();
  const m = document.getElementById('rev-msg').value.trim();
  const e = document.getElementById('rev-error');

  e.classList.remove('show');

  if (!n) {
    e.textContent = t.rev_error_name;
    e.classList.add('show');
    return;
  }

  if (!reviewRating) {
    e.textContent = t.rev_error_rate;
    e.classList.add('show');
    return;
  }

  window.open('https://wa.me/212725950908?text=' + encodeURIComponent(
    `مرحباً saidcars 👋

*تقييم جديد*
👤 ${n}
${'⭐'.repeat(reviewRating)} ${reviewRating}/5${m ? '
📝 ' + m : ''}

شكراً!`
  ), '_blank');

  document.getElementById('rev-name').value = '';
  document.getElementById('rev-msg').value = '';
  resetReviewRating();
  showToast(t.rev_sent, 'success');
}

// ===== ENHANCED FORM VALIDATION =====
function validateAndSend() {
  clearErrors();
  const t = i18n[currentLang];
  let h = false;

  const c = document.getElementById('f-car').value;
  const n = document.getElementById('f-name').value.trim();
  const p = document.getElementById('f-phone').value.trim();
  const f = document.getElementById('f-from').value;
  const s = document.getElementById('f-start').value;
  const e = document.getElementById('f-end').value;
  const m = document.getElementById('f-msg').value.trim();

  if (!c) {
    showFieldError('f-car', 'err-car', t.val_car);
    h = true;
  }
  if (!n) {
    showFieldError('f-name', 'err-name', t.val_name);
    h = true;
  }
  if (!p || p.replace(/[\s\+\-\(\)]/g, '').length < 8) {
    showFieldError('f-phone', 'err-phone', t.val_phone);
    h = true;
  }
  if (!s || !e) {
    showFieldError('f-start', 'err-start', t.val_dates);
    showFieldError('f-end', 'err-end', '');
    h = true;
  }
  if (s && e) {
    const ds = new Date(s);
    const de = new Date(e);
    if (de <= ds) {
      showFieldError('f-end', 'err-end', t.val_end_before_start);
      h = true;
    }
    if (Math.ceil((de - ds) / 86400000) < 3) {
      showFieldError('f-end', 'err-end', t.val_min3);
      h = true;
    }
  }

  if (h) {
    const fe = document.querySelector('.ff input.error, .ff select.error');
    if (fe) fe.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  window.open('https://wa.me/212725950908?text=' + encodeURIComponent(t.wa_msg(n, c, f, s, e, m)), '_blank');
  closeModal();
  showToast(t.toast_msg, 'success');
}

// ===== ENHANCED LANGUAGE SWITCHING =====
function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('ruamsefeh_lang', lang);
  const t = i18n[lang];

  document.title = "Ru Amsefeh - Location Voitures Marrakech";
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.getAttribute('data-i18n');
    if (t[k] !== undefined) el.textContent = t[k];
  });

  const isAr = lang === 'ar';
  document.documentElement.setAttribute('dir', isAr ? 'rtl' : 'ltr');
  document.documentElement.setAttribute('lang', lang);
  document.body.style.fontFamily = isAr ? 'var(--ff-ar)' : 'var(--ff-body)';

  document.querySelectorAll('.lang-flag-btn').forEach(b => b.classList.remove('active'));
  const ab = document.getElementById('lang-' + lang);
  if (ab) ab.classList.add('active');

  buildCars();
  buildConditions();
  buildTestimonials();
  updateModalLabels();
  buildCarSelect();
  resetReviewRating();
  tIdx = 0;
  setTimeout(initSlider, 100);

  // Update loader text
  const loaderText = document.getElementById('loaderText');
  if (loaderText) {
    if (lang === 'ar') loaderText.textContent = 'جاري التحميل...';
    else if (lang === 'en') loaderText.textContent = 'Loading...';
    else loaderText.textContent = 'Chargement...';
  }
}

// ===== ENHANCED SEASON TOGGLE =====
function setSeason(s) {
  currentSeason = s;
  document.getElementById('btn-normal').classList.toggle('active', s === 'normal');
  document.getElementById('btn-summer').classList.toggle('active', s === 'summer');
  buildCars();
}

// ===== ENHANCED CAR SELECT =====
function buildCarSelect() {
  const t = i18n[currentLang];
  const s = document.getElementById('f-car');
  if (!s) return;
  s.innerHTML = `<option value="">${t.car_choose}</option>`;
  cars.forEach(c => {
    const o = document.createElement('option');
    o.value = c.name;
    o.textContent = c.name;
    s.appendChild(o);
  });
  if (currentCar && s.querySelector(`option[value="${currentCar}"]`)) {
    s.value = currentCar;
  }
}

// ===== ENHANCED CONDITIONS =====
function buildConditions() {
  const t = i18n[currentLang];
  ['cond1', 'cond2', 'cond3'].forEach(k => {
    const l = document.getElementById(k + '-list');
    if (l) {
      l.innerHTML = '';
      t[k].forEach(i => {
        const li = document.createElement('li');
        li.textContent = i;
        l.appendChild(li);
      });
    }
  });
}

// ===== ENHANCED MODAL LABELS =====
function updateModalLabels() {
  const t = i18n[currentLang];
  document.getElementById('m-title').textContent = t.m_title;
  document.getElementById('m-sub').textContent = t.m_sub;
  document.getElementById('l-car').textContent = t.l_car;
  document.getElementById('l-name').textContent = t.l_name;
  document.getElementById('l-phone').textContent = t.l_phone;
  document.getElementById('l-from').textContent = t.l_from;
  document.getElementById('l-start').textContent = t.l_start;
  document.getElementById('l-end').textContent = t.l_end;
  document.getElementById('l-msg').textContent = t.l_msg;
  document.getElementById('m-btn-txt').textContent = t.m_btn;
}

// ===== ENHANCED ERROR HANDLING =====
function clearErrors() {
  document.querySelectorAll('.ff input.error, .ff select.error').forEach(e => e.classList.remove('error'));
  document.querySelectorAll('.error-msg').forEach(e => {
    e.classList.remove('show');
    e.textContent = '';
  });
}

function showFieldError(fid, eid, m) {
  const f = document.getElementById(fid);
  const e = document.getElementById(eid);
  if (f) f.classList.add('error');
  if (e) {
    e.textContent = m;
    e.classList.add('show');
  }
}

// ===== ENHANCED WHATSAPP =====
function openWA() {
  const g = currentLang === 'ar' ? 'مرحباً saidcars 🚗' : (currentLang === 'en' ? 'Hello saidcars 🚗' : 'Bonjour saidcars 🚗');
  window.open('https://wa.me/212725950908?text=' + encodeURIComponent(g), '_blank');
}

// ===== ENHANCED REVIEW RATING =====
function setReviewRating(v) {
  reviewRating = v;
  document.querySelectorAll('#review-stars .star').forEach((s, i) => {
    s.classList.toggle('active', i < v);
  });
}

function resetReviewRating() {
  reviewRating = 0;
  document.querySelectorAll('#review-stars .star').forEach(s => s.classList.remove('active'));
}

// ===== ENHANCED LANGUAGE DETECTION =====
function detectLang() {
  const s = localStorage.getItem('ruamsefeh_lang');
  if (s && (s === 'fr' || s === 'en' || s === 'ar')) return s;
  const l = (navigator.language || 'fr').split('-')[0];
  return l === 'ar' ? 'ar' : l === 'fr' ? 'fr' : 'en';
}

// ===== INITIALIZATION =====
(function() {
  const l = detectLang();
  currentLang = l;
  document.documentElement.setAttribute('dir', l === 'ar' ? 'rtl' : 'ltr');
  document.documentElement.setAttribute('lang', l);
  document.body.style.fontFamily = l === 'ar' ? 'var(--ff-ar)' : 'var(--ff-body)';

  document.addEventListener('DOMContentLoaded', () => {
    setLang(l);
    observeAll();
  });
})();

// ===== RESIZE HANDLER =====
window.addEventListener('resize', () => {
  tIdx = 0;
  setTimeout(initSlider, 150);
}, { passive: true });

</script>
